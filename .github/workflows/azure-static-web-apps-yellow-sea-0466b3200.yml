name: Azure Static Web Apps CI/CD (Auto-Injection Mode)
#甯﹀悗绔疐UCNTION鐗堟湰 宸茬粡搴熷純
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    
  # 卤拢鲁脰卤拢禄卯脠脦脦帽拢卢路脌脰鹿 Function 陆酶脠毛脡卯露脠脨脻脙脽
  schedule:
    - cron: '*/10 * * * *'

jobs:
  # 脠脦脦帽 1拢潞卤拢禄卯脠脦脦帽
  keep_alive:
    runs-on: ubuntu-latest
    steps:
      - name: Heartbeat to Azure Function
        run: |
          curl -s "https://forever302free-h0d9bvemhaaffzhk.southeastasia-01.azurewebsites.net/go?code=${{ secrets.AZURE_FUNCTION_KEY }}&action=get" > /dev/null
          echo "Heartbeat sent at $(date)"

  # 脠脦脦帽 2拢潞鹿鹿陆篓脫毛虏驴脢冒
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
       id-token: write
       contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # ? 潞脣脨脛脨脼赂麓拢潞脠路卤拢 goo.html 潞脥 manage.html 脥卢脢卤禄帽碌脙脗路戮露脳垄脠毛
      - name: Inject Info into HTML Files
        run: |
          # 1. 脳垄脠毛脭颅脫脨 index 潞脥 go 碌脛 Key
          [ -f "index.html" ] && sed -i "s/__AZURE_KEY__/${{ secrets.AZURE_FUNCTION_KEY }}/g" index.html
          [ -f "go.html" ] && sed -i "s/__AZURE_KEY__/${{ secrets.AZURE_FUNCTION_KEY }}/g" go.html
          
          # 2. 卤茅脌煤麓娄脌铆脨猫脪陋 API 脰卤脕卢碌脛脪鲁脙忙
          # 脠路卤拢脣霉脫脨脮录脦禄路没 __REPO_OWNER__ 潞脥 __REPO_NAME__ 卤禄脤忙禄禄
          for file in manage.html goo.html; do
            if [ -f "$file" ]; then
              echo "Injecting repo info into $file..."
              sed -i "s/__REPO_OWNER__/${{ github.repository_owner }}/g" "$file"
              sed -i "s/__REPO_NAME__/${{ github.event.repository.name }}/g" "$file"
            fi
          done
          echo "Injection process finished."

      - name: Install OIDC Client
        run: npm install @actions/core@1.6.0 @actions/http-client
        
      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
           script: |
               const coredemo = require('@actions/core')
               return await coredemo.getIDToken()
           result-encoding: string

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_YELLOW_SEA_0466B3200}}
          action: "upload"
          app_location: "/" 
          api_location: "/api" 
          output_location: "" 
          skip_app_build: true      
          github_id_token: ${{ steps.idtoken.outputs.result }}

  # 脠脦脦帽 3拢潞脟氓脌铆脠脦脦帽
  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_YELLOW_SEA_0466B3200 }}
          action: "close"
