name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  # ✨ 新增：每 10 分钟自动运行一次，解决冷启动延迟
  schedule:
    - cron: '*/10 * * * *'

jobs:
  # ✨ 新增任务 1：冷启动保活任务
  keep_alive:
    runs-on: ubuntu-latest
    steps:
      - name: Heartbeat to Azure Function
        run: |
          curl -s "https://forever302free-h0d9bvemhaaffzhk.southeastasia-01.azurewebsites.net/api/nexus-handler?code=${{ secrets.AZURE_FUNCTION_KEY }}&action=get" > /dev/null
          echo "Heartbeat sent at $(date)"

  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
       id-token: write
       contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # ✨ 新增任务 2：在部署前将 HTML 里的占位符替换为真实的 Key
      # 这样公开仓库源码里只有 __AZURE_KEY__，保证安全
      - name: Inject Secret Key into HTML
        run: |
          sed -i "s/__AZURE_KEY__/${{ secrets.AZURE_FUNCTION_KEY }}/g" index.html

      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client
      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
           script: |
               const coredemo = require('@actions/core')
               return await coredemo.getIDToken()
           result-encoding: string
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_YELLOW_SEA_0466B3200 }}
          action: "upload"
          app_location: "/" 
          api_location: "" 
          output_location: "" 
          skip_app_build: true      
          github_id_token: ${{ steps.idtoken.outputs.result }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_YELLOW_SEA_0466B3200 }}
          action: "close"
