<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; }
        /* В№Г¶В¶ВҜГҢГөГ‘Г№ГҠВҪ */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        input { transition: all 0.2s; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div class="bg-slate-800 border-b border-slate-700 p-4 flex items-center justify-between shadow-md z-20">
        <div class="flex items-center gap-4 flex-1 max-w-3xl">
            <h1 class="font-bold text-xl text-sky-500 mr-4"><i class="fas fa-network-wired"></i> Nexus</h1>
            
            <div class="flex-1 relative group">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-key text-slate-500 group-focus-within:text-sky-400"></i>
                </div>
                <input type="password" id="tokenInput" 
                    class="w-full bg-slate-900 border border-slate-600 text-slate-200 text-sm rounded-lg block pl-10 p-2.5 placeholder-slate-500 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500" 
                    placeholder="Г”ГҡВҙГӢГҠГӨГҲГ« GitHub Token (Г—Г”В¶ВҜВұВЈВҙГҰВөВҪВұВҫВөГҳ)"
                    onchange="saveTokenAndReload(this.value)">
            </div>
            
            <button onclick="fetchConfig()" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg text-sm transition-colors whitespace-nowrap">
                <i class="fas fa-sync-alt mr-1"></i> ГӢВўГҗГӮГҠГҪВҫГқ
            </button>
        </div>

        <div class="ml-4 flex items-center gap-3">
            <span id="statusMsg" class="text-sm text-slate-400">ВөГҲВҙГҪГҒВ¬ВҪГ“...</span>
            <button onclick="saveToGithub()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-6 py-2 rounded-lg shadow-lg shadow-emerald-900/20 transition-all active:scale-95">
                <i class="fas fa-cloud-upload-alt mr-2"></i> ВұВЈВҙГҰВёГјВёГ„
            </button>
        </div>
    </div>

    <div class="flex-1 flex overflow-hidden">
        
        <div class="w-64 bg-slate-800 border-r border-slate-700 flex flex-col z-10">
            <div class="p-3 text-xs font-bold text-slate-500 uppercase tracking-wider border-b border-slate-700">User IDs</div>
            <div id="userList" class="flex-1 overflow-y-auto p-2 space-y-1">
                </div>
            <div class="p-3 border-t border-slate-700 bg-slate-800">
                <button onclick="createUser()" class="w-full py-2 border border-dashed border-slate-600 text-slate-400 hover:text-sky-400 hover:border-sky-400 rounded text-sm transition-colors">
                    <i class="fas fa-plus"></i> ГҗГӮВҪВЁГ“ГғВ»В§
                </button>
            </div>
        </div>

        <div class="flex-1 flex flex-col bg-[#0f172a] relative">
            <div id="welcomeScreen" class="absolute inset-0 flex flex-col items-center justify-center text-slate-600">
                <i class="fas fa-cube text-6xl mb-4 opacity-50"></i>
                <p>ГҮГ«Г”ГҡВ¶ВҘВІВҝГҠГӨГҲГ« TokenВЈВ¬ВІВўГ‘ВЎГ”ГұГ—ГіВІГ Г“ГғВ»В§</p>
            </div>

            <div id="editorScreen" class="hidden flex-1 flex flex-col h-full">
                <div class="h-12 border-b border-slate-700 flex items-center px-6 bg-slate-800/30 backdrop-blur">
                    <span class="text-slate-400 mr-2">Г•ГҪГ”ГҡВұГ ВјВӯ:</span>
                    <span id="currentUserId" class="font-bold text-sky-400 text-lg">...</span>
                </div>
                
                <div id="editorContainer" class="flex-1 overflow-y-auto p-8 space-y-6 pb-32">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        //  Г…ГӨГ–ГғГҮГё (YML Г—Г”В¶ВҜГҢГҰВ»В»)
        // ==========================================
        const CONFIG = {
            owner: "__REPO_OWNER__",
            repo: "__REPO_NAME__",
            path: "config.json"
        };
        const TOKEN_KEY = 'nexus_gh_pat_v2'; // ВұВҫВөГҳВҙГҰВҙВў Key

        // ==========================================
        //  ВәГӢГҗГ„ГӮГҹВјВӯ
        // ==========================================
        let appData = {};
        let currentSha = "";
        let activeId = null;
        let ghToken = localStorage.getItem(TOKEN_KEY);

        // 1. ВіГөГҠВјВ»ВҜВЈВәГ—Г”В¶ВҜГҢГ®ВіГӨ Token ВІВўВјГ“Г”Гҳ
        (function init() {
            const input = document.getElementById('tokenInput');
            if (ghToken) {
                input.value = ghToken; // ГҢГ®ВіГӨГҠГӨГҲГ«ВҝГІ
                fetchConfig();         // Г—Г”В¶ВҜГҖВӯГҲВЎ
            }
        })();

        // 2. Token ВұВЈВҙГҰГӮГҹВјВӯ
        function saveTokenAndReload(val) {
            val = val.trim();
            if (val) {
                localStorage.setItem(TOKEN_KEY, val);
                ghToken = val;
                fetchConfig(); // Token ВұГӨГҒГӢВЈВ¬Г–ГҳГҗГӮГҖВӯГҲВЎ
            }
        }

        // 3. ВҙГ“ GitHub В»ГұГҲВЎГҠГҪВҫГқ
        async function fetchConfig() {
            if (!ghToken) return showStatus("ГҮГ«ГҠГӨГҲГ« Token", "warn");
            
            showStatus("Г•ГҪГ”ГҡВјГ“Г”ГҳГ…ГӨГ–Гғ...", "loading");
            try {
                const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}?t=${Date.now()}`;
                const res = await fetch(url, { headers: { 'Authorization': `token ${ghToken}` } });
                
                if (res.status === 404) {
                    appData = {}; 
                    currentSha = null;
                    showStatus("ГҗГӮВҪВЁГ…ГӨГ–ГғГҺГ„ВјГҫ", "success");
                } else if (!res.ok) {
                    throw new Error("Token ГҺГһГҗВ§В»ГІГҚГёГӮГ§ВҙГӯГҺГі");
                } else {
                    const json = await res.json();
                    currentSha = json.sha;
                    // UTF-8 ВҪГўГӮГ«В·ГҖГ–В№ГӮГ’ГӮГ«
                    appData = JSON.parse(decodeURIComponent(escape(atob(json.content))));
                    showStatus("ГҠГҪВҫГқГ’Г‘ГҚВ¬ВІВҪ", "success");
                }
                
                renderSidebar();
                
                // ВұВЈВіГ–ВөВұГҮВ°Г‘ВЎГ–ГҗВөГ„Г“ГғВ»В§ВҪГ§ГғГҰ
                if (activeId && appData[activeId]) {
                    renderEditor(activeId);
                } else {
                    // ГҲГ§В№Г» URL Г“Гҗ id ВІГҺГҠГҪВЈВ¬Г—Г”В¶ВҜГ‘ВЎГ–Гҗ
                    const urlId = new URLSearchParams(window.location.search).get('id');
                    if (urlId && appData[urlId]) selectUser(urlId);
                }

            } catch (e) {
                console.error(e);
                showStatus("ГҒВ¬ВҪГ“ГҠВ§В°ГңВЈВ¬ГҮГ«ВјГ¬ВІГ© Token", "error");
            }
        }

        // 4. ВұВЈВҙГҰВөВҪ GitHub
        async function saveToGithub() {
            if (!ghToken) return alert("ГҮГ«ГҸГҲГҠГӨГҲГ« Token");
            if (!confirm("ГҲВ·В¶ВЁГ’ВӘВұВЈВҙГҰВІВўВ·ВўВІВјВёГјВёГ„ГӮГ°ВЈВҝ")) return;

            showStatus("Г•ГҪГ”ГҡГҚГҶГӢГҚ...", "loading");
            try {
                const contentStr = JSON.stringify(appData, null, 2);
                const contentB64 = btoa(unescape(encodeURIComponent(contentStr)));

                const body = {
                    message: "Update via Nexus Admin",
                    content: contentB64,
                    sha: currentSha
                };

                const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                    method: 'PUT',
                    headers: { 
                        'Authorization': `token ${ghToken}`,
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify(body)
                });

                if (!res.ok) throw new Error("ВұВЈВҙГҰГҠВ§В°Гң");
                
                const resData = await res.json();
                currentSha = resData.content.sha; // ВёГјГҗГӮ SHA
                showStatus("ВұВЈВҙГҰВіГүВ№ВҰВЈВЎ", "success");

            } catch (e) {
                alert("ВұВЈВҙГҰГҠВ§В°Гң: " + e.message);
                showStatus("ВұВЈВҙГҰГҠВ§В°Гң", "error");
            }
        }

        // ==========================================
        //  UI ГӨГ–ГҲВҫГ“Г«ВҪВ»В»ВҘ
        // ==========================================
        
        function showStatus(msg, type) {
            const el = document.getElementById('statusMsg');
            el.innerText = msg;
            el.className = "text-sm transition-colors " + 
                (type === 'error' ? 'text-rose-400' : 
                 type === 'success' ? 'text-emerald-400' : 
                 type === 'warn' ? 'text-amber-400' : 'text-slate-400');
        }

        function renderSidebar() {
            const list = document.getElementById('userList');
            list.innerHTML = '';
            Object.keys(appData).forEach(id => {
                const isActive = id === activeId;
                const div = document.createElement('div');
                div.className = `px-3 py-2 cursor-pointer rounded flex justify-between items-center group transition-colors mb-1 ${isActive ? 'bg-sky-600 text-white' : 'text-slate-400 hover:bg-slate-700 hover:text-slate-200'}`;
                div.onclick = () => selectUser(id);
                div.innerHTML = `
                    <span class="truncate font-medium">${id}</span>
                    <i onclick="deleteUser('${id}', event)" class="fas fa-trash-alt text-xs opacity-0 group-hover:opacity-100 hover:text-rose-300 p-1 transition-opacity"></i>
                `;
                list.appendChild(div);
            });
        }

        function selectUser(id) {
            activeId = id;
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('editorScreen').classList.remove('hidden');
            document.getElementById('currentUserId').innerText = id;
            renderSidebar(); // ГӢВўГҗГӮВёГҹГҒГҒ
            renderEditor(id);
        }

        function renderEditor(id) {
            const container = document.getElementById('editorContainer');
            container.innerHTML = '';
            const userData = appData[id];

            // ВұГ©ГҖГәВ·Г–Г—Г©
            for (const [groupName, links] of Object.entries(userData)) {
                const groupEl = document.createElement('div');
                groupEl.className = "bg-slate-800 border border-slate-700 rounded-xl p-5 relative group/card shadow-sm";
                
                let linksHtml = '';
                for (const [linkName, url] of Object.entries(links)) {
                    linksHtml += `
                        <div class="flex gap-3 mb-3 items-center">
                            <input type="text" value="${linkName}" onchange="updateKey('${groupName}', '${linkName}', this.value)" 
                                class="bg-slate-900 border border-slate-700 rounded px-3 py-2 text-sm w-1/3 text-slate-200 focus:border-sky-500 focus:outline-none focus:ring-1 focus:ring-sky-500 placeholder-slate-600" placeholder="ГҒВҙВҪГ“ГғГ»">
                            <input type="text" value="${url}" onchange="updateVal('${groupName}', '${linkName}', this.value)" 
                                class="bg-slate-900 border border-slate-700 rounded px-3 py-2 text-sm flex-1 text-sky-400 focus:border-sky-500 focus:outline-none focus:ring-1 focus:ring-sky-500 font-mono placeholder-slate-600" placeholder="URL">
                            <button onclick="deleteLink('${groupName}', '${linkName}')" class="text-slate-600 hover:text-rose-500 px-2 transition-colors"><i class="fas fa-times"></i></button>
                        </div>
                    `;
                }

                groupEl.innerHTML = `
                    <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-700/50">
                        <div class="flex items-center gap-2">
                            <i class="fas fa-folder text-slate-500"></i>
                            <input type="text" value="${groupName}" onchange="renameGroup('${groupName}', this.value)" 
                                class="bg-transparent border-b border-transparent hover:border-slate-600 focus:border-sky-500 focus:outline-none text-lg font-bold text-slate-100 w-48 transition-all">
                        </div>
                        <button onclick="deleteGroup('${groupName}')" class="text-xs text-slate-500 hover:text-rose-400 border border-slate-700 hover:border-rose-400 px-2 py-1 rounded opacity-0 group-hover/card:opacity-100 transition-all">ГүВҫВіГҪВ·Г–Г—Г©</button>
                    </div>
                    <div>${linksHtml}</div>
                    <button onclick="addLink('${groupName}')" class="mt-2 text-xs font-bold text-sky-500 hover:text-sky-400 flex items-center py-1 opacity-80 hover:opacity-100 transition-opacity">
                        <i class="fas fa-plus-circle mr-1"></i> ГҢГӯВјГ“ГҒВҙВҪГ“
                    </button>
                `;
                container.appendChild(groupEl);
            }

            // ВөГ—ВІВҝВЈВәГҢГӯВјГ“В·Г–Г—Г©В°ВҙГ…ВҘ
            const addGroupBtn = document.createElement('button');
            addGroupBtn.className = "w-full py-4 border border-dashed border-slate-700 text-slate-500 hover:text-sky-400 rounded-xl hover:border-sky-500 transition-all flex items-center justify-center gap-2 hover:bg-slate-800/50";
            addGroupBtn.innerHTML = "<i class='fas fa-layer-group'></i> <span>ГҢГӯВјГ“ГҗГӮВ·Г–Г—Г© (Group)</span>";
            addGroupBtn.onclick = () => {
                const name = prompt("В·Г–Г—Г©ГғГ»ВіГҶ:");
                if (name && !appData[id][name]) {
                    appData[id][name] = {};
                    renderEditor(id);
                }
            };
            container.appendChild(addGroupBtn);
        }

        // ==========================================
        //  ГҠГҪВҫГқВІГҷГ—Г· (CRUD)
        // ==========================================
        function createUser() {
            const id = prompt("ГҗГӮГ“ГғВ»В§ ID:");
            if (id && !appData[id]) {
                appData[id] = { "Links": {} };
                selectUser(id);
            }
        }
        function deleteUser(id, e) {
            e.stopPropagation();
            if (confirm(`ГүВҫВіГҪГ“ГғВ»В§ ${id} ?`)) {
                delete appData[id];
                if (activeId === id) { activeId = null; document.getElementById('editorScreen').classList.add('hidden'); document.getElementById('welcomeScreen').classList.remove('hidden'); }
                renderSidebar();
            }
        }
        function updateVal(group, key, val) { appData[activeId][group][key] = val; }
        function updateKey(group, oldKey, newKey) {
            if (!newKey || oldKey === newKey) return;
            const val = appData[activeId][group][oldKey];
            delete appData[activeId][group][oldKey];
            appData[activeId][group][newKey] = val;
        }
        function deleteLink(group, key) { delete appData[activeId][group][key]; renderEditor(activeId); }
        function addLink(group) { appData[activeId][group]["ГҗГӮГҒВҙВҪГ“"] = ""; renderEditor(activeId); }
        function renameGroup(oldName, newName) {
            if (!newName || oldName === newName) return;
            const content = appData[activeId][oldName];
            delete appData[activeId][oldName];
            appData[activeId][newName] = content;
            renderEditor(activeId);
        }
        function deleteGroup(group) { if (confirm("ГүВҫВіГҪВ·Г–Г—Г©?")) { delete appData[activeId][group]; renderEditor(activeId); } }

    </script>
</body>
</html>
