<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        /* 脪镁虏脴鹿枚露炉脤玫碌芦卤拢脕么鹿娄脛脺 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="loginLayer" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 p-4">
        <div class="w-full max-w-md bg-slate-800 border border-slate-700 rounded-2xl p-8 shadow-2xl">
            <div class="text-center mb-8">
                <div class="inline-block p-3 rounded-full bg-slate-700 mb-4">
                    <i class="fas fa-terminal text-2xl text-sky-400"></i>
                </div>
                <h1 class="text-2xl font-bold text-white">Nexus 驴脴脰脝脤篓</h1>
                <p class="text-slate-400 text-sm mt-2">Serverless Configuration Manager</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">GitHub Personal Access Token</label>
                    <input type="password" id="tokenInput" class="w-full bg-slate-900 border border-slate-700 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-sky-500 transition-all" placeholder="ghp_xxxxxxxxxxxx">
                </div>
                <button onclick="Auth.login()" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 rounded-lg transition-colors shadow-lg shadow-sky-900/50">
                    <i class="fas fa-key mr-2"></i> 脩茅脰陇虏垄陆酶脠毛
                </button>
                <p class="text-xs text-center text-slate-600 mt-4">Token 陆枚卤拢麓忙脭脷卤戮碌脴 LocalStorage拢卢脨猫戮脽卤赂 Repo 露脕脨麓脠篓脧脼隆拢</p>
            </div>
        </div>
    </div>

    <div id="appLayer" class="flex-1 flex hidden relative">
        
        <aside class="w-72 bg-slate-800 border-r border-slate-700 flex flex-col z-20">
            <div class="h-16 flex items-center justify-between px-6 border-b border-slate-700 bg-slate-800">
                <span class="font-bold text-sky-400 tracking-wide">USERS</span>
                <button onclick="Auth.logout()" class="text-slate-500 hover:text-rose-500 transition-colors" title="脥脣鲁枚"><i class="fas fa-power-off"></i></button>
            </div>
            
            <div id="userList" class="flex-1 overflow-y-auto p-3 space-y-1 no-scrollbar">
                </div>

            <div class="p-4 border-t border-slate-700 bg-slate-800">
                <button onclick="Actions.createUser()" class="w-full py-2 border border-dashed border-slate-600 text-slate-400 hover:text-sky-400 hover:border-sky-400 rounded transition-all text-sm">
                    <i class="fas fa-plus mr-1"></i> 脨脗陆篓 ID (User)
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-[#0f172a] relative">
            <header class="h-16 border-b border-slate-700 flex items-center justify-between px-8 bg-slate-800/50 backdrop-blur-md sticky top-0 z-10">
                <div class="flex items-center gap-4">
                    <h2 id="currentUserId" class="text-xl font-bold text-white">...</h2>
                    <span id="saveStatus" class="text-xs px-2 py-1 rounded bg-slate-800 text-slate-500 transition-all opacity-0">脪脩卤拢麓忙</span>
                </div>
                <div class="flex gap-3">
                    <button onclick="Data.fetch()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-200 rounded-lg text-sm font-medium transition-colors">
                        <i class="fas fa-sync-alt mr-2"></i>脰脴脰脙
                    </button>
                    <button onclick="Data.save()" class="px-6 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg text-sm font-bold shadow-lg shadow-emerald-900/20 transition-all hover:scale-105">
                        <i class="fas fa-save mr-2"></i>卤拢麓忙赂眉赂脛
                    </button>
                </div>
            </header>

            <div id="editorContainer" class="flex-1 overflow-y-auto p-8 scroll-smooth">
                <div id="groupsWrapper" class="max-w-4xl mx-auto space-y-6 pb-20">
                    </div>
                
                <div id="emptyState" class="hidden h-full flex flex-col items-center justify-center text-slate-600 opacity-60">
                    <i class="fas fa-cube text-6xl mb-4"></i>
                    <p>脟毛脭脷脳贸虏脿脩隆脭帽脪禄赂枚 ID 陆酶脨脨卤脿录颅</p>
                </div>

                <div id="addGroupBtnWrapper" class="max-w-4xl mx-auto hidden">
                    <button onclick="Actions.addGroup()" class="group flex items-center text-slate-500 hover:text-sky-400 transition-colors py-4">
                        <span class="w-8 h-8 rounded-full border border-slate-600 group-hover:border-sky-400 flex items-center justify-center mr-3">
                            <i class="fas fa-plus"></i>
                        </span>
                        <span class="font-medium">脤铆录脫脨脗路脰脳茅 (Group)</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        /**
         * 潞脣脨脛脜盲脰脙脟酶
         * 脮芒脨漏脮录脦禄路没禄谩卤禄脛茫碌脛 YML 脳脭露炉脤忙禄禄
         */
        const CONFIG = {
            owner: "__REPO_OWNER__",
            repo: "__REPO_NAME__",
            path: "config.json"
        };

        // 脠芦戮脰脳麓脤卢
        let store = {
            data: {},       // 脥锚脮没碌脛 JSON 脢媒戮脻
            sha: null,      // GitHub 脦脛录镁 SHA (脫脙脫脷掳忙卤戮驴脴脰脝)
            activeId: null, // 碌卤脟掳脩隆脰脨碌脛 User ID
            token: localStorage.getItem('nexus_pat')
        };

        // ----------------------------------------------------
        // 1. 脠脧脰陇脛拢驴茅
        // ----------------------------------------------------
        const Auth = {
            init() {
                if (store.token) {
                    document.getElementById('loginLayer').classList.add('hidden');
                    document.getElementById('appLayer').classList.remove('hidden');
                    Data.fetch();
                }
            },
            login() {
                const val = document.getElementById('tokenInput').value.trim();
                if (!val.startsWith('gh')) return alert('Token 赂帽脢陆驴麓脝冒脌麓虏禄露脭 (脫娄脪脭 gh 驴陋脥路)');
                localStorage.setItem('nexus_pat', val);
                store.token = val;
                location.reload();
            },
            logout() {
                if(confirm('脠路露篓脥脣鲁枚脗冒拢驴Token 陆芦卤禄脟氓鲁媒隆拢')) {
                    localStorage.removeItem('nexus_pat');
                    location.reload();
                }
            }
        };

        // ----------------------------------------------------
        // 2. 脢媒戮脻虏茫 (GitHub API)
        // ----------------------------------------------------
        const Data = {
            async fetch() {
                UI.toast('脮媒脭脷脌颅脠隆脜盲脰脙...', 'loading');
                try {
                    const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}?t=${Date.now()}`;
                    const res = await fetch(url, { headers: { 'Authorization': `token ${store.token}` } });
                    
                    if (res.status === 404) {
                        store.data = {}; // 脨脗虏脰驴芒脛卢脠脧驴脮露脭脧贸
                        store.sha = null;
                        UI.initSidebar();
                        return;
                    }
                    
                    if (!res.ok) throw new Error(`API Error ${res.status}`);
                    
                    const json = await res.json();
                    store.sha = json.sha;
                    // UTF-8 陆芒脗毛
                    const content = decodeURIComponent(escape(window.atob(json.content)));
                    store.data = JSON.parse(content);
                    
                    UI.toast('录脫脭脴鲁脡鹿娄', 'success');
                    UI.initSidebar();
                    
                    // 脠莽鹿没脰庐脟掳脩隆脰脨脕脣脠脣拢卢脣垄脨脗潞贸卤拢鲁脰脩隆脰脨
                    if(store.activeId && store.data[store.activeId]) {
                        UI.renderEditor(store.activeId);
                    } else {
                        store.activeId = null;
                        UI.toggleEmptyState(true);
                    }

                } catch (e) {
                    console.error(e);
                    UI.toast('录脫脭脴脢搂掳脺: ' + e.message, 'error');
                    if(e.message.includes('401')) Auth.logout(); // Token 脢搂脨搂
                }
            },

            async save() {
                if (!confirm('脠路露篓脪陋陆芦赂眉赂脛脥脝脣脥碌陆 GitHub 脗冒拢驴脮芒禄谩录麓脢卤脡煤脨搂隆拢')) return;
                UI.toast('脮媒脭脷脥脝脣脥...', 'loading');

                try {
                    // 赂帽脢陆禄炉虏垄 UTF-8 卤脿脗毛
                    const jsonStr = JSON.stringify(store.data, null, 2);
                    const b64Content = window.btoa(unescape(encodeURIComponent(jsonStr)));
                    
                    const body = {
                        message: `Nexus Update: ${new Date().toLocaleString()}`,
                        content: b64Content,
                        sha: store.sha
                    };

                    const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${store.token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(body)
                    });

                    if (!res.ok) throw new Error('Write Failed');
                    
                    const result = await res.json();
                    store.sha = result.content.sha; // 赂眉脨脗 SHA 路脌脰鹿鲁氓脥禄
                    UI.toast('卤拢麓忙鲁脡鹿娄拢隆', 'success');

                } catch (e) {
                    console.error(e);
                    UI.toast('卤拢麓忙脢搂掳脺拢卢脟毛录矛虏茅驴脴脰脝脤篓', 'error');
                }
            }
        };

        // ----------------------------------------------------
        // 3. 脗脽录颅虏脵脳梅虏茫
        // ----------------------------------------------------
        const Actions = {
            createUser() {
                const id = prompt("脟毛脢盲脠毛脨脗 ID (脳脰脛赂/脢媒脳脰):");
                if (!id) return;
                if (store.data[id]) return alert("ID 脪脩麓忙脭脷");
                
                // 脛卢脠脧脛拢掳氓
                store.data[id] = { "鲁拢脫脙": { "Google": "https://google.com" } };
                UI.initSidebar();
                UI.selectUser(id);
            },
            deleteUser(id, e) {
                e.stopPropagation(); // 路脌脰鹿麓楼路垄 select
                if (!confirm(`戮炉赂忙拢潞脠路露篓鲁鹿碌脳脡戮鲁媒脫脙禄搂 [${id}] 脗冒拢驴`)) return;
                delete store.data[id];
                if (store.activeId === id) {
                    store.activeId = null;
                    UI.toggleEmptyState(true);
                }
                UI.initSidebar();
            },
            addGroup() {
                const name = prompt("路脰脳茅脙没鲁脝 (脠莽: 鹿陇脳梅, 脫茅脌脰):");
                if (!name) return;
                if (store.data[store.activeId][name]) return alert("路脰脳茅脪脩麓忙脭脷");
                
                store.data[store.activeId][name] = {};
                UI.renderEditor(store.activeId);
            },
            renameGroup(oldName, newName) {
                if (!newName || oldName === newName) return;
                const userData = store.data[store.activeId];
                // 卤拢鲁脰脣鲁脨貌脫脨脨漏脗茅路鲁拢卢脮芒脌茂录貌禄炉脦陋脰脴脨脗赂鲁脰碌拢卢脣鲁脨貌驴脡脛脺禄谩卤盲碌陆脳卯潞贸
                const content = userData[oldName];
                delete userData[oldName];
                userData[newName] = content;
                UI.renderEditor(store.activeId);
            },
            deleteGroup(groupName) {
                if (!confirm("脡戮鲁媒麓脣路脰脳茅录掳脝盲脣霉脫脨脕麓陆脫拢驴")) return;
                delete store.data[store.activeId][groupName];
                UI.renderEditor(store.activeId);
            },
            addLink(groupName) {
                const name = "Link " + Math.floor(Math.random()*1000);
                store.data[store.activeId][groupName][name] = "";
                UI.renderEditor(store.activeId);
            },
            updateLinkKey(groupName, oldKey, newKey) {
                if (!newKey || oldKey === newKey) return;
                const group = store.data[store.activeId][groupName];
                const url = group[oldKey];
                delete group[oldKey];
                group[newKey] = url;
                // 虏禄脣垄脨脗 UI 脪脭卤拢鲁脰陆鹿碌茫
            },
            updateLinkVal(groupName, key, newVal) {
                store.data[store.activeId][groupName][key] = newVal;
            },
            deleteLink(groupName, key) {
                delete store.data[store.activeId][groupName][key];
                UI.renderEditor(store.activeId);
            }
        };

        // ----------------------------------------------------
        // 4. UI 盲脰脠戮虏茫
        // ----------------------------------------------------
        const UI = {
            toggleEmptyState(isEmpty) {
                document.getElementById('emptyState').classList.toggle('hidden', !isEmpty);
                document.getElementById('groupsWrapper').innerHTML = '';
                document.getElementById('addGroupBtnWrapper').classList.toggle('hidden', isEmpty);
                document.getElementById('currentUserId').innerText = isEmpty ? '...' : store.activeId;
            },

            initSidebar() {
                const list = document.getElementById('userList');
                list.innerHTML = '';
                Object.keys(store.data).forEach(id => {
                    const el = document.createElement('div');
                    const isActive = id === store.activeId;
                    el.className = `group flex justify-between items-center px-4 py-3 rounded-lg cursor-pointer transition-all mb-1 ${isActive ? 'bg-sky-600 text-white shadow-lg shadow-sky-900/50' : 'text-slate-400 hover:bg-slate-700 hover:text-slate-200'}`;
                    el.onclick = () => UI.selectUser(id);
                    el.innerHTML = `
                        <span class="font-medium truncate">${id}</span>
                        <button onclick="Actions.deleteUser('${id}', event)" class="opacity-0 group-hover:opacity-100 p-1 hover:text-rose-300 transition-opacity"><i class="fas fa-trash-alt"></i></button>
                    `;
                    list.appendChild(el);
                });
            },

            selectUser(id) {
                store.activeId = id;
                UI.initSidebar(); // 脣垄脨脗赂脽脕脕
                UI.toggleEmptyState(false);
                UI.renderEditor(id);
            },

            renderEditor(id) {
                const container = document.getElementById('groupsWrapper');
                container.innerHTML = '';
                const userData = store.data[id];

                Object.entries(userData).forEach(([groupName, links]) => {
                    const card = document.createElement('div');
                    card.className = "bg-slate-800 border border-slate-700 rounded-xl p-6 relative group/card hover:border-slate-600 transition-all";
                    
                    // 鹿鹿陆篓脕麓陆脫脕脨卤铆
                    let linksHtml = '';
                    Object.entries(links).forEach(([linkName, url]) => {
                        linksHtml += `
                            <div class="flex gap-3 mb-3 items-center">
                                <div class="w-1/3 relative">
                                    <input type="text" value="${linkName}" 
                                        onchange="Actions.updateLinkKey('${groupName}', '${linkName}', this.value)"
                                        class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-sm text-slate-200 focus:border-sky-500 focus:outline-none focus:ring-1 focus:ring-sky-500 transition-all placeholder-slate-600" 
                                        placeholder="脙没鲁脝">
                                </div>
                                <div class="flex-1 relative">
                                    <input type="text" value="${url}" 
                                        onchange="Actions.updateLinkVal('${groupName}', '${linkName}', this.value)"
                                        class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-sm text-sky-400 focus:border-sky-500 focus:outline-none focus:ring-1 focus:ring-sky-500 transition-all placeholder-slate-600 font-mono" 
                                        placeholder="https://...">
                                </div>
                                <button onclick="Actions.deleteLink('${groupName}', '${linkName}')" class="text-slate-600 hover:text-rose-500 w-8 h-8 flex items-center justify-center rounded hover:bg-slate-700 transition-colors"><i class="fas fa-times"></i></button>
                            </div>
                        `;
                    });

                    card.innerHTML = `
                        <div class="flex justify-between items-center mb-5 pb-2 border-b border-slate-700/50">
                            <div class="flex items-center gap-3 flex-1">
                                <i class="fas fa-layer-group text-slate-500"></i>
                                <input type="text" value="${groupName}" 
                                    onchange="Actions.renameGroup('${groupName}', this.value)"
                                    class="bg-transparent border-b border-transparent hover:border-slate-600 focus:border-sky-500 focus:outline-none text-lg font-bold text-slate-100 transition-colors w-full max-w-xs">
                            </div>
                            <button onclick="Actions.deleteGroup('${groupName}')" class="text-xs text-slate-500 hover:text-rose-400 px-3 py-1 rounded border border-slate-700 hover:border-rose-400/50 transition-all opacity-0 group-hover/card:opacity-100">脡戮鲁媒路脰脳茅</button>
                        </div>
                        <div>${linksHtml}</div>
                        <button onclick="Actions.addLink('${groupName}')" class="mt-2 text-xs font-bold text-sky-500 hover:text-sky-400 flex items-center py-2 px-1 opacity-80 hover:opacity-100 transition-opacity">
                            <i class="fas fa-plus-circle mr-2"></i> 脤铆录脫脕麓陆脫
                        </button>
                    `;
                    container.appendChild(card);
                });
            },

            toast(msg, type = 'info') {
                const el = document.getElementById('saveStatus');
                el.innerText = msg;
                el.classList.remove('opacity-0', 'text-slate-500', 'text-emerald-400', 'text-rose-400');
                
                if (type === 'success') el.classList.add('text-emerald-400');
                else if (type === 'error') el.classList.add('text-rose-400');
                else el.classList.add('text-sky-400');
                
                el.classList.add('opacity-100');
                if (type !== 'loading') {
                    setTimeout(() => el.classList.add('opacity-0'), 3000);
                }
            }
        };

        // 脝么露炉
        Auth.init();
    </script>
</body>
</html>
