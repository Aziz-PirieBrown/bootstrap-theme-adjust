<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Nexus Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="loader" class="fixed inset-0 z-50 flex items-center justify-center bg-[#0f172a]">
        <div class="text-center">
            <div class="inline-block w-8 h-8 border-4 border-sky-500 border-t-transparent rounded-full spin mb-4"></div>
            <p id="statusText" class="text-slate-400 text-sm">Г•ГҪГ”ГҡВјГ¬ВІГ©ВұВҫВөГҳГҶВҫГ–ВӨ...</p>
        </div>
    </div>

    <div id="loginLayer" class="fixed inset-0 z-40 flex items-center justify-center bg-[#0f172a]/95 backdrop-blur hidden">
        <div class="w-full max-w-md p-8 bg-slate-800 rounded-2xl border border-slate-700 shadow-2xl">
            <div class="text-center mb-6">
                <i class="fab fa-github text-4xl text-white mb-3"></i>
                <h2 class="text-xl font-bold text-white">Nexus ГҒВ¬ВҪГ“Г‘Г©Г–ВӨ</h2>
                <p class="text-xs text-slate-400 mt-2">Token ВҪВ«ВҪГ¶ВҙГҰВҙВўГ”ГҡГ„ГәГӨВҜГҖГҖГҶГ·ВөГ„ LocalStorage Г–Гҗ</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">GitHub Personal Access Token</label>
                    <input type="password" id="tokenInput" placeholder="Г•ВіГҢГ№ ghp_... (Г”ВҙГӮГ«ВІВ»ГҸГ”ГҠВҫ)" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-3 text-white text-sm focus:outline-none focus:border-sky-500 transition-colors">
                </div>
                <button onclick="saveTokenAndLogin()" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 rounded-lg transition-colors shadow-lg shadow-sky-900/20">
                    Г‘Г©Г–ВӨВІВўВұВЈВҙГҰ
                </button>
            </div>
        </div>
    </div>

    <div id="app" class="flex-1 flex hidden">
        <div class="w-64 bg-slate-800 border-r border-slate-700 flex flex-col">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center">
                <span class="font-bold text-sky-400">Nexus Г“ГғВ»В§</span>
                <button onclick="logout()" class="text-xs text-slate-500 hover:text-rose-400" title="ГҮГҘВіГҪВұВҫВөГҳTokenГҚГӢВіГ¶">
                    <i class="fas fa-sign-out-alt mr-1"></i>ГҚГӢВіГ¶
                </button>
            </div>
            <div id="userList" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
            <div class="p-3 border-t border-slate-700">
                <button onclick="createUser()" class="w-full py-2 border border-dashed border-slate-600 text-slate-400 hover:text-sky-400 rounded text-sm transition-colors">+ ГҗГӮВҪВЁГ“ГғВ»В§ ID</button>
            </div>
        </div>

        <div class="flex-1 flex flex-col h-full bg-[#0f172a]">
            <div class="h-14 border-b border-slate-700 flex items-center justify-between px-6 bg-slate-800/50 backdrop-blur-sm z-10">
                <span id="currentIdDisplay" class="font-bold text-white">ГҮГ«Г‘ВЎГ”ГұГ—ГіВІГ Г“ГғВ»В§</span>
                <button onclick="saveConfig()" id="saveBtn" class="px-5 py-1.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg text-sm font-bold shadow-lg shadow-emerald-900/20 transition-all hover:scale-105">
                    ВұВЈВҙГҰВёГјВёГ„
                </button>
            </div>
            <div id="editorArea" class="flex-1 overflow-y-auto p-8 pb-20"></div>
        </div>
    </div>

    <script>
        // === Г…ГӨГ–ГғГҮГё (YMLВ»ГЎГ—Г”В¶ВҜГҢГҰВ»В») ===
        const OWNER = "__REPO_OWNER__";
        const REPO = "__REPO_NAME__";
        const PATH = "config.json";
        
        // === ГҲВ«ВҫГ–ВұГӨГҒВҝ ===
        let configData = {};
        let currentSha = "";
        let activeId = null;
        // В№ГҳВјГјВЈВәВҙГ“ВұВҫВөГҳВ»ВәВҙГҰВ¶ГҒГҲВЎ Token
        let myToken = localStorage.getItem('nexus_gh_token');

        // === 1. ВіГөГҠВјВ»ВҜВіГҢГҗГІ ===
        (async function init() {
            const loader = document.getElementById('loader');
            const loginLayer = document.getElementById('loginLayer');
            const status = document.getElementById('statusText');

            // ГҲГ§В№Г»ВұВҫВөГҳГғВ»Г“Гҗ TokenВЈВ¬ГҸГ”ГҠВҫВөГҮГӮВјВҝГІ
            if (!myToken) {
                loader.classList.add('hidden');
                loginLayer.classList.remove('hidden');
                return;
            }

            // ГҲГ§В№Г»Г“Гҗ TokenВЈВ¬ВіВўГҠГ”ГҖВӯГҲВЎГҠГҪВҫГқ
            try {
                status.innerText = "Г•ГҪГ”ГҡВҙГ“ GitHub ГҚВ¬ВІВҪ...";
                await fetchData(); // ГҖВӯГҲВЎГҠГҪВҫГқ
                
                // ВіГүВ№ВҰВәГіГҸГ”ГҠВҫГ–Г·ВҪГ§ГғГҰ
                loader.classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                renderSidebar();

                // URL Г—Г”В¶ВҜГ‘ВЎГ–ГҗГӮГҹВјВӯ
                const urlId = new URLSearchParams(window.location.search).get('id');
                if(urlId && configData[urlId]) selectUser(urlId);

            } catch (e) {
                // ГҲГ§В№Г» Token ГҠВ§ГҗВ§В»ГІГҚГёГӮГ§ВҙГӯГҺГі
                console.error(e);
                if(e.message.includes('401') || e.message.includes('Bad credentials')) {
                    alert("ВұВҫВөГҳВұВЈВҙГҰВөГ„ Token ГӢГҶВәГөГ’Г‘ГҠВ§ГҗВ§ВЈВ¬ГҮГ«Г–ГҳГҗГӮГҠГӨГҲГ«ВЎВЈ");
                    logout(); // ГҮГҘВіГҪВҫГү Token ВІВўГӢВўГҗГӮ
                } else {
                    status.innerText = "ГҒВ¬ВҪГ“ВҙГӯГҺГі: " + e.message;
                    status.classList.add('text-rose-500');
                }
            }
        })();

        // === 2. ВәГӢГҗГ„ API ВІГҷГ—Г· ===

        // Г‘Г©Г–ВӨВІВўВұВЈВҙГҰ Token (ВөГҡГ’В»ВҙГҺГ“ГғГҠВұВҙВҘВ·Вў)
        async function saveTokenAndLogin() {
            const input = document.getElementById('tokenInput');
            const val = input.value.trim();
            if (!val.startsWith('gh')) return alert("Token ВёГұГҠВҪВҝВҙГҶГ°ГҖВҙВІВ»В¶Г” (ГҚВЁВіВЈГ’Г” ghp_ ВҝВӘГҚВ·)");
            
            // ВҙГҰГҲГ«ВұВҫВөГҳ
            localStorage.setItem('nexus_gh_token', val);
            myToken = val;
            
            // ГӢВўГҗГӮГ’ВіГғГҰВҙВҘВ·Вў init()
            location.reload();
        }

        // ГҚГӢВіГ¶ (ГҮГҘВіГҪВұВҫВөГҳ Token)
        function logout() {
            if(confirm("ГҲВ·В¶ВЁГҚГӢВіГ¶ГӮГ°ВЈВҝГ•ГўВҪВ«ГҮГҘВіГҪВұВҫВөГҳВұВЈВҙГҰВөГ„ TokenВЎВЈ")) {
                localStorage.removeItem('nexus_gh_token');
                location.reload();
            }
        }

        // ГҖВӯГҲВЎГҠГҪВҫГқ
        async function fetchData() {
            const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}?t=${Date.now()}`;
            const res = await fetch(url, { headers: { 'Authorization': `token ${myToken}` } });

            if (res.status === 404) {
                configData = {}; // ГҗГӮГҺГ„ВјГҫ
                return;
            }
            if (!res.ok) throw new Error(`API Error ${res.status}`);

            const json = await res.json();
            currentSha = json.sha;
            // UTF8 ВҪГўГӮГ«
            configData = JSON.parse(decodeURIComponent(escape(atob(json.content))));
        }

        // ВұВЈВҙГҰГҠГҪВҫГқ
        async function saveConfig() {
            const btn = document.getElementById('saveBtn');
            const originalText = btn.innerText;
            btn.innerText = "Г•ГҪГ”ГҡГҚГҶГӢГҚ...";
            btn.disabled = true;
            btn.classList.add('opacity-75');

            try {
                // ВұГ ГӮГ«
                const contentStr = JSON.stringify(configData, null, 2);
                const contentB64 = btoa(unescape(encodeURIComponent(contentStr)));

                const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`, {
                    method: 'PUT',
                    headers: { 
                        'Authorization': `token ${myToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: "Update config via Nexus Admin",
                        content: contentB64,
                        sha: currentSha
                    })
                });

                if(!res.ok) throw new Error("ВұВЈВҙГҰГҠВ§В°Гң");
                const data = await res.json();
                currentSha = data.content.sha; // ВёГјГҗГӮ SHA ВұГңГғГўВіГҘГҚВ»

                btn.innerText = "ВұВЈВҙГҰВіГүВ№ВҰ!";
                btn.classList.replace('bg-emerald-600', 'bg-sky-600');
                setTimeout(() => { 
                    btn.innerText = originalText; 
                    btn.classList.replace('bg-sky-600', 'bg-emerald-600');
                    btn.disabled = false;
                    btn.classList.remove('opacity-75');
                }, 2000);

            } catch (e) {
                alert("ВұВЈВҙГҰГҠВ§В°Гң: " + e.message);
                btn.innerText = originalText;
                btn.disabled = false;
                btn.classList.remove('opacity-75');
            }
        }

        // === 3. UI ГӨГ–ГҲВҫГӮГҹВјВӯ (ВұВЈВіГ–Г”ВӯГ‘Г№) ===

        function renderSidebar() {
            const list = document.getElementById('userList');
            list.innerHTML = '';
            Object.keys(configData).forEach(id => {
                const div = document.createElement('div');
                div.className = `px-3 py-2 cursor-pointer rounded flex justify-between group transition-colors ${id === activeId ? 'bg-sky-600 text-white shadow' : 'text-slate-400 hover:bg-slate-700/50 hover:text-slate-200'}`;
                div.onclick = () => selectUser(id);
                div.innerHTML = `<span class="truncate font-medium">${id}</span> <button onclick="deleteUser('${id}', event)" class="opacity-0 group-hover:opacity-100 hover:text-rose-300 transition-all px-2"><i class="fas fa-trash-alt text-xs"></i></button>`;
                list.appendChild(div);
            });
        }

        function selectUser(id) {
            activeId = id;
            document.getElementById('currentIdDisplay').innerText = id;
            renderSidebar();
            renderEditor();
        }

        function renderEditor() {
            const container = document.getElementById('editorArea');
            container.innerHTML = '';
            if(!activeId) return;

            const userData = configData[activeId];
            
            for(const group in userData) {
                const groupEl = document.createElement('div');
                groupEl.className = "mb-6 bg-slate-800 p-5 rounded-xl border border-slate-700/50 shadow-sm relative group/card";
                
                let linksHtml = '';
                for(const linkName in userData[group]) {
                    linksHtml += `
                        <div class="flex gap-3 mb-3 items-center">
                            <input class="bg-slate-900 border border-slate-700 text-slate-300 text-sm rounded px-3 py-2 w-1/3 focus:border-sky-500 focus:outline-none transition-colors" value="${linkName}" onchange="updateKey('${group}', '${linkName}', this.value)" placeholder="ГғГ»ВіГҶ">
                            <input class="bg-slate-900 border border-slate-700 text-sky-400 text-sm rounded px-3 py-2 flex-1 focus:border-sky-500 focus:outline-none transition-colors font-mono" value="${userData[group][linkName]}" onchange="updateVal('${group}', '${linkName}', this.value)" placeholder="https://...">
                            <button onclick="delLink('${group}', '${linkName}')" class="text-slate-500 hover:text-rose-500 w-8 h-8 flex items-center justify-center rounded hover:bg-slate-700 transition-colors"><i class="fas fa-times"></i></button>
                        </div>
                    `;
                }

                groupEl.innerHTML = `
                    <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-700/50">
                        <input class="bg-transparent font-bold text-lg text-slate-100 border-b border-transparent hover:border-slate-600 focus:border-sky-500 focus:outline-none transition-colors w-48" value="${group}" onchange="renameGroup('${group}', this.value)">
                        <button onclick="delGroup('${group}')" class="text-xs text-slate-500 hover:text-rose-400 border border-slate-700 px-2 py-1 rounded opacity-0 group-hover/card:opacity-100 transition-all">ГүВҫВіГҪВ·Г–Г—Г©</button>
                    </div>
                    ${linksHtml}
                    <button onclick="addLink('${group}')" class="text-xs font-bold text-sky-500 hover:text-sky-400 mt-2 flex items-center py-1 px-1 opacity-70 hover:opacity-100 transition-opacity"><i class="fas fa-plus-circle mr-1"></i>ГҢГӯВјГ“ГҒВҙВҪГ“</button>
                `;
                container.appendChild(groupEl);
            }
            
            const addGroupBtn = document.createElement('button');
            addGroupBtn.className = "w-full py-4 border border-dashed border-slate-700 text-slate-500 hover:text-sky-400 rounded-xl hover:border-sky-500 hover:bg-slate-800/50 transition-all flex items-center justify-center gap-2";
            addGroupBtn.innerHTML = "<i class='fas fa-folder-plus'></i> <span>ГҢГӯВјГ“ГҗГӮВ·Г–Г—Г©</span>";
            addGroupBtn.onclick = () => {
                const name = prompt("ГҗГӮВ·Г–Г—Г©ГғГ»ВіГҶ:");
                if(name && !configData[activeId][name]) {
                    configData[activeId][name] = {};
                    renderEditor();
                }
            };
            container.appendChild(addGroupBtn);
        }

        // === 4. ГҠГҪВҫГқВІГҷГ—Г· (ВёВЁГ–ГәВәВҜГҠГҪ) ===
        function updateVal(g, k, v) { configData[activeId][g][k] = v; }
        function updateKey(g, oldK, newK) {
            if(!newK || oldK === newK) return;
            const v = configData[activeId][g][oldK];
            delete configData[activeId][g][oldK];
            configData[activeId][g][newK] = v;
        }
        function addLink(g) { configData[activeId][g]["New Link"] = ""; renderEditor(); }
        function delLink(g, k) { delete configData[activeId][g][k]; renderEditor(); }
        function renameGroup(oldN, newN) {
            if(!newN || oldN === newN) return;
            const d = configData[activeId][oldN];
            delete configData[activeId][oldN];
            configData[activeId][newN] = d;
            renderEditor();
        }
        function delGroup(g) { if(confirm("ГүВҫВіГҪВ·Г–Г—Г©?")) { delete configData[activeId][g]; renderEditor(); } }
        function createUser() {
            const id = prompt("ГҗГӮ ID (Г—Г–Г„Вё/ГҠГҪГ—Г–):");
            if(id && !configData[id]) { configData[id] = {"Г„В¬ГҲГҸВ·Г–Г—Г©":{}}; selectUser(id); }
        }
        function deleteUser(id, e) {
            e.stopPropagation();
            if(confirm("ГүВҫВіГҪГ“ГғВ»В§ " + id + "?")) {
                delete configData[id];
                if(activeId === id) { activeId = null; document.getElementById('editorArea').innerHTML = ''; }
                renderSidebar();
            }
        }
    </script>
</body>
</html>
