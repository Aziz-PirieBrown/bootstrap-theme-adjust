<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #0f172a;
            color: #e2e8f0;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .status-shell {
            max-width: 880px;
            margin: 24px auto;
            padding: 20px;
        }

        .panel {
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 16px;
            padding: 18px 20px;
            box-shadow: 0 14px 36px rgba(2, 6, 23, 0.32);
        }

        .title {
            margin: 0 0 8px;
            font-size: 24px;
            font-weight: 700;
        }

        .subtitle {
            margin: 0 0 18px;
            color: #94a3b8;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .card {
            background: rgba(30, 41, 59, 0.72);
            border: 1px solid rgba(148, 163, 184, 0.12);
            border-radius: 12px;
            padding: 12px 14px;
        }

        .card-label {
            color: #94a3b8;
            font-size: 12px;
            margin-bottom: 6px;
        }

        .card-value {
            color: #f8fafc;
            font-size: 14px;
            word-break: break-all;
        }

        .status-bar {
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(30, 41, 59, 0.72);
        }

        .status-bar.error {
            border-color: rgba(248, 113, 113, 0.35);
            background: rgba(127, 29, 29, 0.28);
            color: #fecaca;
        }

        .status-bar.success {
            border-color: rgba(74, 222, 128, 0.32);
            background: rgba(20, 83, 45, 0.32);
            color: #bbf7d0;
        }

        .status-bar.info {
            color: #cbd5e1;
        }

        .preview {
            margin-top: 16px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(2, 6, 23, 0.58);
        }

        .preview-header {
            padding: 10px 14px;
            font-size: 13px;
            color: #94a3b8;
            border-bottom: 1px solid rgba(148, 163, 184, 0.14);
        }

        .link-picker {
            margin-top: 16px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(2, 6, 23, 0.58);
        }

        .link-picker-header {
            padding: 10px 14px;
            font-size: 13px;
            color: #94a3b8;
            border-bottom: 1px solid rgba(148, 163, 184, 0.14);
        }

        .link-picker-content {
            padding: 14px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.16);
            background: rgba(30, 41, 59, 0.58);
            color: #e2e8f0;
            text-decoration: none;
            transition: 0.2s ease;
        }

        .link-item + .link-item {
            margin-top: 10px;
        }

        .link-item:hover {
            border-color: rgba(56, 189, 248, 0.6);
            background: rgba(30, 41, 59, 0.84);
            transform: translateY(-1px);
        }

        .link-copy {
            min-width: 0;
            flex: 1;
        }

        .link-name-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
            min-width: 0;
        }

        .link-group {
            color: #7dd3fc;
            font-size: 12px;
            font-weight: 600;
        }

        .link-sep {
            color: #64748b;
            font-size: 12px;
        }

        .link-name {
            color: #f8fafc;
            font-size: 14px;
            font-weight: 600;
            min-width: 0;
        }

        .link-url {
            color: #94a3b8;
            font-size: 13px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .link-arrow {
            color: #38bdf8;
            font-size: 18px;
            flex-shrink: 0;
        }

        pre {
            margin: 0;
            padding: 14px;
            max-height: 320px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 13px;
            line-height: 1.5;
            color: #e2e8f0;
        }

        .hidden {
            display: none;
        }
    </style>
        <script>
            const AZURE_KEY = "__AZURE_KEY__";
            const CONFIG_API_PATH = "/api/config";
            let OWNER = "";
            let REPO = "";
            const CONFIG_FILE_PATH = "dsfdsf234b235";
            const CONFIG_CIPHER_KEY = "NEXUS_LITE_2026";
            const CACHE_TOKEN_KEY = "NEXUS_GH_TOKEN_V2";

            function utf8Encode(str) { return new TextEncoder().encode(str); }
            function utf8Decode(buf) { return new TextDecoder().decode(buf); }
            function xorBytes(inputBytes, keyText) {
                const keyBytes = utf8Encode(keyText);
                const out = new Uint8Array(inputBytes.length);
                for (let i = 0; i < inputBytes.length; i++) out[i] = inputBytes[i] ^ keyBytes[i % keyBytes.length];
                return out;
            }
            function bytesToBase64(bytes) {
                let binary = "";
                bytes.forEach(b => binary += String.fromCharCode(b));
                return btoa(binary);
            }
            function base64ToBytes(base64) {
                return Uint8Array.from(atob(base64), c => c.charCodeAt(0));
            }
            function encryptConfigPayload(data) {
                const json = JSON.stringify(data, null, 2);
                const encrypted = xorBytes(utf8Encode(json), CONFIG_CIPHER_KEY);
                return { v: 1, alg: "xor-base64", data: bytesToBase64(encrypted) };
            }
            function decryptConfigPayload(payload) {
                if (!payload || typeof payload !== "object") return payload || {};
                if (payload.alg !== "xor-base64" || !payload.data) return payload;
                const decrypted = xorBytes(base64ToBytes(payload.data), CONFIG_CIPHER_KEY);
                return JSON.parse(utf8Decode(decrypted));
            }
            const INPUT_PREVIEW_LIMIT = 100;
    
            let currentSha = null;
            let currentToken = "";
    
            function jsonResponse(success, data = null, error = null, meta = {}) {
                return { success, data, error, meta };
            }
    
            function getInputPreview(input) {
                return String(input ?? "").slice(0, INPUT_PREVIEW_LIMIT);
            }
    
            function getDataLength(value) {
                try {
                    return JSON.stringify(value ?? null).length;
                } catch (error) {
                    return 0;
                }
            }
    
            function getEntryCount(data) {
                if (Array.isArray(data)) return data.length;
                if (data && typeof data === "object") return Object.keys(data).length;
                return 0;
            }
    
            function buildTargetUrl(id) {
                return `https://forever302free-h0d9bvemhaaffzhk.southeastasia-01.azurewebsites.net/go?code=${AZURE_KEY}&id=${encodeURIComponent(id)}`;
            }
    
            function validateShortlinkData(data) {
                if (!data || typeof data !== "object") {
                    return jsonResponse(false, null, "Invalid data", {
                        inputPreview: getInputPreview(data),
                        length: getDataLength(data),
                    });
                }
    
                return jsonResponse(true, data, null, {
                    inputPreview: getInputPreview(JSON.stringify(data)),
                    length: getDataLength(data),
                    entryCount: getEntryCount(data),
                });
            }
    
            function getToken() {
                const input = document.getElementById("tokenInput");
                return (input?.value || currentToken || new URLSearchParams(window.location.search).get("token") || "").trim();
            }
    
            function persistToken(token) {
                currentToken = token;
                if (!token) {
                    window.localStorage.removeItem(CACHE_TOKEN_KEY);
                    return;
                }
                window.localStorage.setItem(CACHE_TOKEN_KEY, token);
            }
    
            function getGitHubHeaders(token) {
                return {
                    "Authorization": `token ${token}`,
                    "Content-Type": "application/json",
                    "Accept": "application/vnd.github+json",
                };
            }
    
            async function loadRuntimeConfig() {
                try {
                    const response = await fetch(`${CONFIG_API_PATH}?t=${Date.now()}`, {
                        cache: "no-store",
                        headers: {
                            "Accept": "application/json",
                        },
                    });
                    if (!response.ok) {
                        return jsonResponse(false, null, `Load failed: HTTP ${response.status}`, {
                            source: "api:/api/config",
                        });
                    }
                    const runtimeConfig = await response.json();
                    OWNER = runtimeConfig.owner || "";
                    REPO = runtimeConfig.repo || "";
                    return jsonResponse(true, runtimeConfig, null, { source: "api:/api/config" });
                } catch (error) {
                    return jsonResponse(false, null, `Load failed: ${error.message}`, {
                        source: "api:/api/config",
                    });
                }
            }

            async function fetchConfigFromGitHub(token) {
                if (!token) {
                    return jsonResponse(false, null, "GitHub token required", {
                        source: "github",
                    });
                }
    
                try {
                    const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${CONFIG_FILE_PATH}?t=${Date.now()}`;
                    const response = await fetch(url, {
                        headers: {
                            "Authorization": `token ${token}`,
                            "Accept": "application/vnd.github+json",
                        },
                    });
    
                    if (response.status === 404) {
                        currentSha = null;
                        return jsonResponse(true, {}, null, {
                            source: "github:new",
                            length: 2,
                            entryCount: 0,
                        });
                    }
    
                    if (!response.ok) {
                        return jsonResponse(false, null, `Load failed: HTTP ${response.status}`, {
                            source: "github",
                        });
                    }
    
                    const payload = await response.json();
                    currentSha = payload.sha || null;
                    const content = decodeURIComponent(escape(atob(payload.content || "")));
                    const data = content ? decryptConfigPayload(JSON.parse(content)) : {};
                    const validation = validateShortlinkData(data);
                    if (!validation.success) {
                        return validation;
                    }
    
                    return jsonResponse(true, data, null, {
                        source: "github:config.json",
                        sha: currentSha,
                        length: validation.meta.length,
                        entryCount: validation.meta.entryCount,
                    });
                } catch (error) {
                    return jsonResponse(false, null, `Load failed: ${error.message}`, {
                        source: "github",
                    });
                }
            }
    
            async function loadShortlinkData() {
                const token = getToken();
                persistToken(token);
                return fetchConfigFromGitHub(token);
            }
    
            async function saveShortlinkData(data) {
                return jsonResponse(false, null, "Deprecated flow: write disabled", {
                    source: "go:readonly",
                });
    
                if (data === undefined || data === null || data === "") {
                    return jsonResponse(false, null, "No input data", {
                        inputPreview: getInputPreview(data),
                        length: getDataLength(data),
                    });
                }
    
                const validation = validateShortlinkData(data);
                if (!validation.success) {
                    return validation;
                }
    
                try {
                    if (currentSha === null) {
                        const existing = await fetchConfigFromGitHub(token);
                        if (!existing.success) {
                            return existing;
                        }
                    }
    
                    const securePayload = encryptConfigPayload(validation.data);
                    const contentStr = JSON.stringify(securePayload, null, 2);
                    const contentB64 = btoa(unescape(encodeURIComponent(contentStr)));
                    const body = {
                        message: "Update via Shortlink Runtime",
                        content: contentB64,
                    };
    
                    if (currentSha) {
                        body.sha = currentSha;
                    }
    
                    const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${CONFIG_FILE_PATH}`, {
                        method: "PUT",
                        headers: getGitHubHeaders(token),
                        body: JSON.stringify(body),
                    });
    
                    const result = await response.json().catch(() => null);
                    if (!response.ok) {
                        return jsonResponse(false, null, result?.message || `Save failed: HTTP ${response.status}`, {
                            source: "github",
                            inputPreview: validation.meta.inputPreview,
                            length: validation.meta.length,
                            entryCount: validation.meta.entryCount,
                        });
                    }
    
                    currentSha = result?.content?.sha || currentSha;
                    return jsonResponse(true, result, null, {
                        source: "github:config.json",
                        sha: currentSha,
                        inputPreview: validation.meta.inputPreview,
                        length: validation.meta.length,
                        entryCount: validation.meta.entryCount,
                    });
                } catch (error) {
                    return jsonResponse(false, null, `Save failed: ${error.message}`, {
                        source: "github",
                        inputPreview: validation.meta.inputPreview,
                        length: validation.meta.length,
                        entryCount: validation.meta.entryCount,
                    });
                }
            }
    
            async function fetchConfigFromStatic() {
                try {
                    const response = await fetch(`${CONFIG_API_PATH}?t=${Date.now()}`, {
                        cache: "no-store",
                        headers: {
                            "Accept": "application/json",
                        },
                    });

                    if (!response.ok) {
                        return jsonResponse(false, null, `Load failed: HTTP ${response.status}`, {
                            source: "api:/api/config",
                        });
                    }

                    const runtimeConfig = await response.json();
                    const data = runtimeConfig && typeof runtimeConfig === 'object' && runtimeConfig.config ? decryptConfigPayload(runtimeConfig.config) : {};
                    const validation = validateShortlinkData(data);
                    if (!validation.success) {
                        return validation;
                    }

                    return jsonResponse(true, data, null, {
                        source: "api:/api/config",
                        length: validation.meta.length,
                        entryCount: validation.meta.entryCount,
                    });
                } catch (error) {
                    return jsonResponse(false, null, `Load failed: ${error.message}`, {
                        source: "api:/api/config",
                    });
                }
            }

            async function resolveConfigData() {
                const runtimeResult = await loadRuntimeConfig();
                if (!runtimeResult.success) {
                    return runtimeResult;
                }
                const token = getToken();
                if (token) {
                    const githubResult = await loadShortlinkData();
                    if (githubResult.success) {
                        return githubResult;
                    }
                }

                return fetchConfigFromStatic();
            }

            function collectUserLinks(userId, userData) {
                const items = [];
                for (const [groupName, links] of Object.entries(userData || {})) {
                    for (const [linkName, url] of Object.entries(links || {})) {
                        if (typeof url === "string" && /^https?:\/\//i.test(url)) {
                            items.push({ userId, groupName, linkName, url });
                        }
                    }
                }
                return items;
            }

            function renderUserLinks(userId, items) {
                const wrapper = document.getElementById("linkPicker");
                const title = document.getElementById("linkPickerTitle");
                const content = document.getElementById("linkPickerContent");

                if (!items.length) {
                    wrapper.classList.add("hidden");
                    title.textContent = "";
                    content.innerHTML = "";
                    return;
                }

                title.textContent = `${userId} 可选链接`;
                content.innerHTML = items.map(({ groupName, linkName, url }) => {
                    const safeGroup = String(groupName);
                    const safeName = String(linkName);
                    const safeUrl = String(url);
                    const displayUrl = safeUrl.replace(/^https?:\/\//i, "");
                    return `
                        <a href="${safeUrl}" class="link-item">
                            <div class="link-copy">
                                <div class="link-name-row">
                                    <span class="link-group">${safeGroup}</span>
                                    <span class="link-sep">/</span>
                                    <span class="link-name">${safeName}</span>
                                </div>
                                <div class="link-url">${displayUrl}</div>
                            </div>
                            <span class="link-arrow">→</span>
                        </a>
                    `;
                }).join("");
                wrapper.classList.remove("hidden");
            }

            async function redirectById(id) {
                if (!id) {
                    window.location.replace("./index.html");
                    return;
                }

                const configResult = await resolveConfigData();
                if (!configResult.success) {
                    updateStatus(configResult, "Resolve");
                    updateMetrics(configResult.meta, id);
                    updatePreview("Resolve error", configResult.error);
                    renderUserLinks(id, []);
                    return;
                }

                const userData = configResult.data?.[id];
                if (!userData || typeof userData !== "object") {
                    const result = jsonResponse(false, null, `User not found: ${id}`, {
                        source: configResult.meta?.source || "runtime",
                    });
                    updateStatus(result, "Resolve");
                    updateMetrics(result.meta, id);
                    updatePreview("Resolve error", result.error);
                    renderUserLinks(id, []);
                    return;
                }

                const items = collectUserLinks(id, userData);
                if (!items.length) {
                    const result = jsonResponse(false, null, `No valid links for user: ${id}`, {
                        source: configResult.meta?.source || "runtime",
                    });
                    updateStatus(result, "Resolve");
                    updateMetrics(result.meta, id);
                    updatePreview("Resolve error", result.error);
                    renderUserLinks(id, []);
                    return;
                }

                updateMetrics({
                    source: configResult.meta?.source || "runtime",
                    length: getDataLength(userData),
                    entryCount: items.length,
                }, id);

                if (items.length === 1) {
                    updateStatus(jsonResponse(true, null, null, {
                        source: configResult.meta?.source || "runtime",
                    }), "Redirect");
                    updatePreview("Target URL", items[0].url);
                    window.location.replace(items[0].url);
                    return;
                }

                updateStatus(jsonResponse(true, null, null, {
                    source: configResult.meta?.source || "runtime",
                }), "Select");
                updatePreview("Loaded user data", userData);
                renderUserLinks(id, items);
            }

            function updateStatus(result, title) {
                const status = document.getElementById("status");
                const mode = result.success ? "success" : "error";
                status.className = `status-bar ${mode}`;
                status.textContent = `${title}: ${result.success ? "success" : (result.error || "failed")}`;
            }

            function updateMetrics(meta = {}, currentId = "") {
                document.getElementById("currentId").textContent = currentId || "-";
                document.getElementById("entryCount").textContent = meta.entryCount ?? 0;
                document.getElementById("dataLength").textContent = meta.length ?? 0;
                document.getElementById("dataSource").textContent = meta.source || "runtime";
            }

            function updatePreview(label, value) {
                const wrapper = document.getElementById("preview");
                const title = document.getElementById("previewTitle");
                const content = document.getElementById("previewContent");

                if (value === undefined || value === null || value === "") {
                    wrapper.classList.add("hidden");
                    content.textContent = "";
                    title.textContent = "";
                    return;
                }

                title.textContent = label;
                content.textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
                wrapper.classList.remove("hidden");
            }

            async function handleManualLoad() {
                const result = await loadShortlinkData();
                updateStatus(result, "Load");
                updateMetrics(result.meta, new URLSearchParams(window.location.search).get("id") || "");
                updatePreview("Loaded data", result.success ? result.data : result.error);
                renderUserLinks("", []);
            }

            async function handleManualSave() {
                const result = jsonResponse(false, null, "Deprecated flow: write disabled", {
                    source: "go:readonly",
                });
                updateStatus(result, "Save");
                updateMetrics(result.meta, new URLSearchParams(window.location.search).get("id") || "");
                updatePreview("Write disabled", "This old go flow is now read-only and will not commit to GitHub.");
                renderUserLinks("", []);
            }

            async function initializePage() {
                const params = new URLSearchParams(window.location.search);
                const id = params.get("id");
                const action = params.get("action");
                const cachedToken = window.localStorage.getItem(CACHE_TOKEN_KEY) || params.get("token") || "";
                const tokenInput = document.getElementById("tokenInput");
                if (tokenInput) {
                    tokenInput.value = cachedToken;
                    tokenInput.addEventListener("change", () => persistToken(tokenInput.value.trim()));
                }
                currentToken = cachedToken;

                document.getElementById("loadBtn").addEventListener("click", handleManualLoad);
                // save disabled for deprecated go flow

                document.getElementById("status").className = "status-bar info";
                document.getElementById("status").textContent = "Initializing...";
                updateMetrics({}, id || "");
                renderUserLinks("", []);

                if (action === "load") {
                    await handleManualLoad();
                    return;
                }

                if (action === "save") {
                    await handleManualSave();
                    return;
                }

                if (!id) {
                    document.getElementById("status").textContent = "No id provided";
                    updatePreview("Usage", "Append ?id=your-user-id to open user links.");
                    return;
                }

                document.getElementById("status").textContent = "Resolving...";
                await redirectById(id);
            }

            window.ShortlinkManager = {
                buildTargetUrl,
                validateShortlinkData,
                loadShortlinkData,
                saveShortlinkData,
                redirectById,
                getInputPreview,
                getDataLength,
                getEntryCount,
                collectUserLinks,
                resolveConfigData,
            };
    
            window.addEventListener("DOMContentLoaded", initializePage);
        </script>
    </head>
    <body>
        <div class="status-shell">
            <div class="panel">
                <h1 class="title">Shortlink Runtime</h1>
                <p class="subtitle">使用 GitHub Token 直接读写仓库加密配置文件 dsfdsf234b235，保留 go 这套函数后端跳转逻辑。</p>
    
                <div class="grid">
                    <div class="card">
                        <div class="card-label">GitHub Token</div>
                        <div class="card-value"><input id="tokenInput" type="password" placeholder="GitHub token" style="width:100%;background:transparent;border:none;outline:none;color:#f8fafc;font:inherit;"></div>
                    </div>
                    <div class="card">
                        <div class="card-label">Actions</div>
                        <div class="card-value">
                            <button id="loadBtn" style="margin-right:8px;background:#1d4ed8;color:#fff;border:none;border-radius:8px;padding:8px 12px;cursor:pointer;">Load</button>
                            <button id="saveBtn" style="background:#334155;color:#94a3b8;border:none;border-radius:8px;padding:8px 12px;cursor:not-allowed;opacity:.7;" disabled>Save Disabled</button>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-label">Current ID</div>
                        <div class="card-value" id="currentId">-</div>
                    </div>
                    <div class="card">
                        <div class="card-label">Entry Count</div>
                        <div class="card-value" id="entryCount">0</div>
                    </div>
                    <div class="card">
                        <div class="card-label">Data Length</div>
                        <div class="card-value" id="dataLength">0</div>
                    </div>
                    <div class="card">
                        <div class="card-label">Data Source</div>
                        <div class="card-value" id="dataSource">runtime</div>
                    </div>
                </div>
    
                <div id="status" class="status-bar info">Initializing...</div>
    
                <div id="preview" class="preview hidden">
                    <div id="previewTitle" class="preview-header"></div>
                    <pre id="previewContent"></pre>
                </div>

                <div id="linkPicker" class="link-picker hidden">
                    <div id="linkPickerTitle" class="link-picker-header"></div>
                    <div id="linkPickerContent" class="link-picker-content"></div>
                </div>
            </div>
        </div>
    </body>
    </html>
