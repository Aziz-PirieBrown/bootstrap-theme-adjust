<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEXUS Link Manager</title>

<style>
[v-cloak] { display: none !important; }

body {
    background-color: #0f172a;
    color: #e2e8f0;
    font-family: system-ui, -apple-system, sans-serif;
    margin: 0;
}

.init-loading {
    color: #38bdf8;
    font-family: monospace;
    font-size: 12px;
    text-transform: uppercase;
}

html { scroll-behavior: smooth; }

::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
::-webkit-scrollbar-track {
    background: #0f172a;
}
::-webkit-scrollbar-thumb {
    background: #334155;
    border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover {
    background: #475569;
}

input {
    border: none !important;
    outline: none !important;
    box-shadow: none !important;
    background-color: transparent;
    appearance: none !important;
    -webkit-appearance: none !important;
}

.group-hover-item:hover .pc-delete {
    opacity: 1;
}
</style>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

<script>
tailwind.config = {
    darkMode: 'class',
    theme: {
        extend: {
            colors: {
                bg: '#0f172a',
                card: '#1e293b',
                border: '#334155',
                primary: '#38bdf8'
            }
        }
    }
}
</script>
</head>

<body class="min-h-screen pb-20 relative text-slate-300">
<div id="app" class="max-w-6xl mx-auto p-4 md:p-8" v-cloak>
    <header class="bg-card border border-border rounded-xl p-6 mb-6 shadow-lg flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-4 w-full md:w-auto">
            <div
                class="w-3 h-3 rounded-full transition-colors duration-500 shrink-0 shadow-[0_0_10px_rgba(0,0,0,0.5)]"
                :class="statusColor"
            ></div>

            <div class="flex-1">
                <h1 class="text-xl sm:text-2xl font-bold text-white uppercase tracking-tight">
                    NEXUS <span class="text-primary">LOCAL</span>
                </h1>

                <div class="text-[10px] sm:text-xs font-mono uppercase tracking-tighter flex gap-2">
                    <span class="text-slate-400">JSON MODE</span>
                    <span
                        class="init-loading"
                        :class="statusText === 'Synced'
                            ? 'text-green-400'
                            : (statusText.includes('Connecting') || statusText.includes('Loading') || statusText.includes('Modified'))
                            ? 'text-yellow-400'
                            : statusText.includes('Offline')
                            ? 'text-blue-400'
                            : 'text-slate-400'"
                    >
                        {{ statusText }}
                    </span>
                </div>
            </div>
        </div>

        <div class="flex-1 w-full md:max-w-md flex items-center gap-2 bg-slate-900/50 p-2 rounded-lg border border-slate-700/50">
            <i class="fas fa-globe text-slate-500 ml-2 text-xs"></i>
            <input
                type="text"
                :value="PUBLIC_DOMAIN"
                readonly
                class="w-full bg-transparent text-sm text-slate-500 px-2 font-mono"
            />
        </div>

        <button
            @click="saveConfig"
            :disabled="isSaving"
            class="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed font-bold text-sm shadow-lg shrink-0 flex items-center gap-2"
        >
            <i class="fas" :class="isSaving ? 'fa-spinner fa-spin' : 'fa-sync-alt'"></i>
            {{ isSaving ? 'SAVING...' : 'SYNC' }}
        </button>
    </header>

    <div class="mb-8">
        <div class="bg-card border border-border rounded-xl p-6 shadow-lg">

            <div class="flex gap-2">
                <button
                    @click="addUser"
                    class="bg-slate-700 hover:bg-slate-600 px-4 rounded-lg font-bold transition-all text-white shrink-0"
                >
                    <i class="fas fa-plus"></i>
                </button>
                <input
                    v-model="newUserId"
                    @keyup.enter="addUser"
                    type="text"
                    placeholder="new user"
                    class="w-full bg-slate-900 rounded-lg px-3 py-2 text-sm text-white font-mono"
                />
            </div>


            <div class="mt-6 border-t border-border/70 pt-5 space-y-3">
                <div>
                    
                    
                </div>
                <input
                    ref="jsonImportInput"
                    id="jsonImportInput"
                    type="file"
                    accept="application/json,.json"
                    class="hidden"
                    @change="importJson"
                />
                <div class="flex flex-col sm:flex-row gap-2">
                    <button
                        type="button"
                        @click="$refs.jsonImportInput.click()"
                        class="flex-1 inline-flex items-center justify-center rounded-lg border border-cyan-400/60 px-4 py-2 text-sm font-medium text-slate-100 transition hover:bg-cyan-500/10"
                    >
                        &#23548;&#20837; JSON
                    </button>
                    <button
                        type="button"
                        @click="exportJson"
                        class="flex-1 inline-flex items-center justify-center rounded-lg bg-cyan-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-cyan-500"
                    >
                        &#23548;&#20986; JSON
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div v-if="Object.keys(config).length > 0" class="flex flex-col gap-6 lg:flex-row lg:items-start">
        <div class="shrink-0 lg:w-auto lg:sticky lg:top-8 self-start">
            <div class="bg-card border border-border rounded-xl p-3 shadow-lg overflow-visible w-fit min-w-[9ch] max-w-none">
                <div class="flex flex-col gap-3 overflow-visible">
                    <div
                        v-for="(val, userId, index) in config"
                        :key="'nav-wrap-' + userId"
                        class="flex items-center gap-2 overflow-visible"
                    >
                        <div
                            @click="scrollToUser(userId)"
                            class="w-fit min-w-[9ch] max-w-none px-3 py-1.5 bg-slate-800 hover:bg-primary/20 border border-slate-700 hover:border-primary rounded-md cursor-pointer transition-all text-xs sm:text-sm font-mono text-slate-400 flex items-center gap-2 overflow-visible whitespace-nowrap"
                        >
                            <i class="fas fa-user-circle text-xs opacity-50 shrink-0"></i>
                            <span class="whitespace-nowrap overflow-visible">{{ userId }}</span>
                        </div>

                        <button
                            v-if="index === 0"
                            @click="scrollTo('top')"
                            class="w-9 h-9 rounded-lg bg-slate-800/80 backdrop-blur border border-white/10 flex items-center justify-center text-primary shadow-lg transition-all hover:bg-primary hover:text-white shrink-0"
                            title="Top"
                        >
                            <i class="fas fa-arrow-up"></i>
                        </button>

                        <button
                            v-if="index === 5 || (Object.keys(config).length < 6 && index === Object.keys(config).length - 1)"
                            @click="scrollTo('bottom')"
                            class="w-9 h-9 rounded-lg bg-slate-800/80 backdrop-blur border border-white/10 flex items-center justify-center text-primary shadow-lg transition-all hover:bg-primary hover:text-white shrink-0"
                            title="Bottom"
                        >
                            <i class="fas fa-arrow-down"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="min-w-0 flex-1 space-y-6">
            <div
                v-for="(userGroups, userId) in config"
                :key="userId"
                :id="'user-' + userId"
                class="bg-card border border-border rounded-xl p-6 shadow-lg relative transition-all mb-6"
            >
                <div class="flex flex-col gap-4 mb-6">
                    <div class="flex items-center justify-between w-full border-b border-white/5 pb-2">
                        <div class="flex items-center gap-3 flex-1 min-w-0">
                            <i class="fas fa-id-badge text-slate-500 text-xl"></i>
                            <input
                                type="text"
                                :value="userId"
                                @change="renameUser(userId, $event.target.value)"
                                class="h-10 px-2 rounded bg-slate-800 font-bold text-primary text-sm uppercase w-full max-w-[240px] text-left truncate border-none shadow-inner"
                                placeholder="NAME"
                            />
                        </div>

                        <button
                            @click="deleteUser(userId)"
                            class="w-8 h-8 flex items-center justify-center text-slate-500 hover:text-rose-500 hover:bg-rose-500/10 rounded-full transition-all"
                        >
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>

                    <div class="flex flex-col items-center justify-center gap-2 py-4 bg-slate-900/30 rounded-xl border border-white/5 border-dashed">
                        <a
                            :href="getJumpUrl(userId)"
                            target="_blank"
                            class="text-lg font-mono text-blue-400 hover:text-blue-300 transition-all transform hover:scale-105 flex items-center gap-2 px-6 py-2 bg-blue-500/10 rounded-full border border-blue-500/20 hover:border-blue-400 hover:shadow-lg hover:shadow-blue-500/20"
                        >
                            <i class="fas fa-rocket"></i>
                            <span>?id={{ userId }}</span>
                        </a>

                        <button
                            @click="copyEndpoint(userId)"
                            class="text-xs text-slate-500 hover:text-primary transition-colors flex items-center gap-1 mt-1"
                        >
                            <i class="fas" :class="copyStatus[userId] ? 'fa-check text-green-400' : 'fa-copy'"></i>
                            {{ copyStatus[userId] ? 'Copied' : 'Copy Link' }}
                        </button>
                    </div>
                </div>

                <div class="space-y-4">
                    <div
                        v-for="(links, groupName) in userGroups"
                        :key="groupName"
                        class="bg-slate-900/50 rounded-lg p-3 sm:p-4 border border-slate-800/20 hover:border-slate-700 transition-colors"
                    >
                        <div class="flex justify-between items-center mb-3 border-b border-white/5 pb-2">
                            <div class="flex items-center gap-2 flex-1">
                                <i class="fas fa-folder text-slate-600 text-xs"></i>
                                <input
                                    type="text"
                                    :value="groupName"
                                    @change="renameGroup(userId, groupName, $event.target.value)"
                                    class="bg-transparent text-xs font-bold text-slate-400 uppercase w-full outline-none focus:text-primary font-mono placeholder-slate-600"
                                />
                            </div>

                            <div class="flex items-center gap-2">
                                <button
                                    @click="toggleGroupProtocol(userId, groupName)"
                                    :class="getGroupStatusClass(links)"
                                    class="px-2 py-0.5 font-bold text-[9px] rounded border transition-all hover:bg-white/5 uppercase"
                                >
                                    {{ getGroupStatusLabel(links) }}
                                </button>

                                <button
                                    @click="addLink(userId, groupName)"
                                    :disabled="Object.keys(links).length >= 20"
                                    class="text-[10px] bg-slate-800 px-2 py-1 rounded text-slate-400 hover:text-white transition-all disabled:opacity-20 flex items-center gap-1"
                                >
                                    <i class="fas fa-plus"></i>
                                    Link
                                </button>

                                <button
                                    @click="deleteGroup(userId, groupName)"
                                    class="w-6 h-6 flex items-center justify-center text-slate-600 hover:text-rose-400 transition-colors"
                                >
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <div
                                v-for="(url, name) in links"
                                :key="getLinkItemKey(userId, groupName, name)"
                                class="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-1 group-hover-item"
                            >
                                <div class="flex items-center gap-1 w-full sm:w-auto">
                                    <button
                                        @click="toggleSingleProtocol(userId, groupName, name)"
                                        :class="String(url).startsWith('https://') ? 'text-primary border-primary/40' : 'text-green-500 border-green-500/50'"
                                        class="w-14 h-6 shrink-0 text-[8px] font-black rounded border transition-all hover:bg-white/5 text-center"
                                    >
                                        {{ String(url).startsWith('https://') ? 'HTTPS' : 'HTTP' }}
                                    </button>

                                    <input
                                        type="text"
                                        :value="getLinkDraft(userId, groupName, name)"
                                        @focus="beginEdit"
                                        @input="onLinkNameInput(userId, groupName, name, $event.target.value)"
                                        @blur="commitLinkName(userId, groupName, name); endEdit()"
                                        @keyup.enter="$event.target.blur()"
                                        class="w-48 shrink-0 bg-slate-900 rounded px-2 py-1 text-xs text-slate-300 font-mono focus:text-primary"
                                        style="min-width: 180px"
                                    />

                                    <a
                                        :href="url"
                                        target="_blank"
                                        class="text-rose-200 hover:text-white flex items-center shrink-0 min-w-[64px] h-8 px-3 justify-center gap-1 rounded bg-rose-700/80 hover:bg-rose-600 transition-colors"
                                    >
                                        <i class="fas fa-external-link-alt text-xs"></i><span class="text-[11px] font-mono uppercase">Go</span>
                                    </a>

                                    <button
                                        @click="copyFullUrl(url, userId, groupName, name)"
                                        class="w-8 h-8 flex items-center justify-center text-slate-500 hover:text-primary transition-colors bg-slate-800/50 rounded shrink-0"
                                    >
                                        <i
                                            class="fas"
                                            :class="copyItemStatus[getCopyItemKey(userId, groupName, name)] ? 'fa-check text-green-400' : 'fa-copy'"
                                        ></i>
                                    </button>

                                    <div class="flex-1 sm:hidden"></div>

                                    <button
                                        @click="deleteLink(userId, groupName, name)"
                                        class="text-slate-600 hover:text-rose-400 px-2 sm:hidden"
                                    >
                                        <i class="fas fa-times"></i>
                                    </button>
                                </div>

                                <input
                                    type="text"
                                    :value="stripProtocol(url)"
                                    @focus="beginEdit"
                                    @input="updateUrl(userId, groupName, name, $event.target.value)"
                                    @blur="endEdit()"
                                    class="w-full sm:flex-1 bg-slate-900 rounded px-2 py-1.5 sm:py-1 text-xs font-mono text-primary truncate focus:bg-slate-800 transition-colors"
                                />

                                <button
                                    @click="deleteLink(userId, groupName, name)"
                                    class="pc-delete hidden sm:flex w-6 h-6 items-center justify-center text-slate-600 hover:text-rose-400 opacity-0 transition-all"
                                >
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <button
                        @click="addGroup(userId)"
                        :disabled="Object.keys(userGroups).length >= 20"
                        class="w-full py-2 border border-dashed border-slate-700 text-slate-500 hover:text-primary hover:border-primary rounded-lg text-[10px] font-bold uppercase tracking-widest transition-all disabled:opacity-20 flex items-center justify-center gap-2"
                    >
                        <i class="fas fa-layer-group"></i>
                        New Group
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div
        v-else
        class="flex flex-col items-center justify-center mt-20 text-slate-500 gap-4"
    >
        <div class="text-5xl opacity-20">
            <i class="fas fa-code-branch"></i>
        </div>
        <div class="text-sm">
            {{ statusText.includes('Connecting') || statusText.includes('Loading') ? 'Connecting to server...' : 'No config yet, create your first identity...' }}
        </div>
    </div>


</div>

<script>
const SERVICE_URL = new URL('./afunction.php', window.location.href).href
const PUBLIC_DOMAIN = new URL('./go.html', window.location.href).href
const CACHE_KEY = 'NEXUS_CONFIG_CACHE'

const { createApp, ref, onMounted, watch } = Vue

createApp({
    setup() {
        const config = ref({})
        const newUserId = ref('')
        const isSaving = ref(false)
        const statusText = ref('Connecting...')
        const statusColor = ref('bg-yellow-500')
        const copyStatus = ref({})
        const copyItemStatus = ref({})
        const linkNameDrafts = ref({})


        let timer = null
        let isBootstrapping = true
        let isSavingByCode = false
        let activeEditCount = 0

        const renameKeyInOrder = (obj, oldKey, newKey) => {
            if (oldKey === newKey) return obj
            const newObj = {}
            Object.keys(obj).forEach(key => {
                if (key === oldKey) newObj[newKey] = obj[key]
                else newObj[key] = obj[key]
            })
            return newObj
        }

        const hasActiveEditor = () => {
            const el = document.activeElement
            return !!(el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA'))
        }

        const beginEdit = () => {
            activeEditCount += 1
            clearTimeout(timer)
        }

        const endEdit = () => {
            activeEditCount = Math.max(0, activeEditCount - 1)
            if (activeEditCount === 0) {
                setTimeout(() => {
                    if (activeEditCount === 0) {
                        queueSave()
                    }
                }, 0)
            }
        }

        const queueSave = () => {
            if (isBootstrapping || isSavingByCode || activeEditCount > 0 || hasActiveEditor()) return

            clearTimeout(timer)

            if (statusText.value === 'Synced' || statusText.value === 'Local Loaded' || statusText.value === 'Offline Mode') {
                statusText.value = 'Modified...'
                statusColor.value = 'bg-yellow-500'
            }

            timer = setTimeout(() => {
                if (activeEditCount > 0 || hasActiveEditor()) return
                saveConfig()
            }, 400)
        }

        const stripProtocol = (url) => String(url || '').replace(/^https?:\/\//, '')

        const sanitizeData = (data) => {
            const cleanData = {}

            Object.keys(data || {}).forEach(userId => {
                const safeUserId = String(userId || '').trim()
                if (!safeUserId) return

                const groups = data[userId] || {}
                const cleanGroups = {}

                Object.keys(groups).forEach(groupName => {
                    const safeGroupName = String(groupName || '').trim()
                    if (!safeGroupName) return

                    const links = groups[groupName] || {}
                    const cleanLinks = {}

                    Object.keys(links).forEach(linkName => {
                        const safeLinkName = String(linkName || '').trim()
                        if (!safeLinkName) return

                        let url = String(links[linkName] || '').trim()
                        if (!url) return

                        if (!/^https?:\/\//i.test(url)) {
                            url = 'https://' + stripProtocol(url)
                        }

                        cleanLinks[safeLinkName] = url
                    })

                    if (Object.keys(cleanLinks).length > 0) {
                        cleanGroups[safeGroupName] = cleanLinks
                    }
                })

                if (Object.keys(cleanGroups).length > 0) {
                    cleanData[safeUserId] = cleanGroups
                }
            })

            return cleanData
        }

        const fetchConfig = async () => {
            const cached = localStorage.getItem(CACHE_KEY)

            if (cached) {
                try {
                    config.value = JSON.parse(cached)
                    statusText.value = 'Local Loaded'
                    statusColor.value = 'bg-blue-400'
                } catch (e) {}
            }

            statusText.value = cached ? 'Loading...' : 'Connecting...'
            statusColor.value = 'bg-yellow-500'

            try {
                const res = await fetch(`${SERVICE_URL}?t=${Date.now()}`, {
                    cache: 'no-store'
                })

                if (!res.ok) {
                    throw new Error('Load failed')
                }

                const rawData = await res.json()
                const onlineData = rawData && typeof rawData === 'object' ? rawData : {}

                config.value = onlineData
                localStorage.setItem(CACHE_KEY, JSON.stringify(onlineData))
                statusText.value = 'Synced'
                statusColor.value = 'bg-green-400'
            } catch (e) {
                statusText.value = cached ? 'Offline Mode' : 'Connect Error'
                statusColor.value = cached ? 'bg-blue-400' : 'bg-red-500'
            } finally {
                setTimeout(() => {
                    isBootstrapping = false
                }, 0)
            }
        }

        const saveConfig = async () => {
            if (isBootstrapping || isSaving.value) return

            isSaving.value = true
            isSavingByCode = true

            const cleanData = sanitizeData(config.value)

            localStorage.setItem(CACHE_KEY, JSON.stringify(cleanData))

            try {
                const res = await fetch(`${SERVICE_URL}?action=save&t=${Date.now()}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(cleanData)
                })

                if (!res.ok) {
                    throw new Error('Save failed')
                }

                config.value = cleanData
                statusText.value = 'Synced'
                statusColor.value = 'bg-green-400'
            } catch (e) {
                statusText.value = 'Save Error'
                statusColor.value = 'bg-red-500'
            } finally {
                isSaving.value = false
                setTimeout(() => {
                    isSavingByCode = false
                }, 0)
            }
        }

        const updateUrl = (id, gn, ln, val) => {
            const oldUrl = config.value[id][gn][ln] || 'https://'
            const prefix = String(oldUrl).startsWith('https://') ? 'https://' : 'http://'
            config.value[id][gn][ln] = prefix + String(val || '').replace(/^https?:\/\//, '')
        }

        const toggleSingleProtocol = (id, gn, ln) => {
            const url = String(config.value[id][gn][ln] || 'https://')
            config.value[id][gn][ln] = url.startsWith('https://')
                ? url.replace(/^https:\/\//, 'http://')
                : url.replace(/^http:\/\//, 'https://')
        }

        const toggleGroupProtocol = (id, gn) => {
            const links = config.value[id][gn]
            const target = Object.values(links).some(u => String(u).startsWith('http://')) ? 'https://' : 'http://'
            for (const key in links) {
                links[key] = target + stripProtocol(links[key])
            }
        }

        const getGroupStatusClass = (links) => {
            const urls = Object.values(links)
            if (urls.every(u => String(u).startsWith('https://'))) return 'text-primary border-primary/40'
            if (urls.every(u => String(u).startsWith('http://'))) return 'text-green-500 border-green-500/50'
            return 'text-yellow-500 border-yellow-500/50'
        }

        const getGroupStatusLabel = (links) => {
            return Object.values(links).every(u => String(u).startsWith('https://')) ? 'HTTPS' : 'HTTP'
        }

        const doCopy = async (text, callback) => {
            try {
                await navigator.clipboard.writeText(text)
                callback()
            } catch (e) {
                const area = document.createElement('textarea')
                area.value = text
                area.style.position = 'fixed'
                area.style.left = '-9999px'
                document.body.appendChild(area)
                area.focus()
                area.select()
                document.execCommand('copy')
                document.body.removeChild(area)
                callback()
            }
        }

        const getJumpUrl = (uid) => `${PUBLIC_DOMAIN}?id=${encodeURIComponent(uid)}`
        const getCopyItemKey = (id, gn, ln) => `${id}__${gn}__${ln}`
        const getLinkItemKey = (id, gn, ln) => `${id}__${gn}__${ln}`
        const getLinkDraftKey = (id, gn, ln) => `${id}__${gn}__${ln}`
        const getLinkDraft = (id, gn, ln) => {
            const key = getLinkDraftKey(id, gn, ln)
            return Object.prototype.hasOwnProperty.call(linkNameDrafts.value, key)
                ? linkNameDrafts.value[key]
                : ln
        }
        const onLinkNameInput = (id, gn, ln, value) => {
            linkNameDrafts.value[getLinkDraftKey(id, gn, ln)] = value
        }
        const commitLinkName = (id, gn, oldName) => {
            const draftKey = getLinkDraftKey(id, gn, oldName)
            const hasDraft = Object.prototype.hasOwnProperty.call(linkNameDrafts.value, draftKey)
            const rawValue = hasDraft ? linkNameDrafts.value[draftKey] : oldName
            delete linkNameDrafts.value[draftKey]
            renameLink(id, gn, oldName, rawValue)
        }

        const copyEndpoint = (uid) => {
            doCopy(getJumpUrl(uid), () => {
                copyStatus.value[uid] = true
                setTimeout(() => { copyStatus.value[uid] = false }, 2000)
            })
        }

        const copyFullUrl = (url, id, gn, ln) => {
            const key = getCopyItemKey(id, gn, ln)
            doCopy(url, () => {
                copyItemStatus.value[key] = true
                setTimeout(() => { copyItemStatus.value[key] = false }, 2000)
            })
        }

        const exportJson = () => {
            try {
                const cleanData = sanitizeData(config.value)
                const blob = new Blob([JSON.stringify(cleanData, null, 2)], {
                    type: 'application/json'
                })
                const url = URL.createObjectURL(blob)
                const a = document.createElement('a')
                a.href = url
                a.download = 'man-config.json'
                document.body.appendChild(a)
                a.click()
                document.body.removeChild(a)
                URL.revokeObjectURL(url)
            } catch (e) {
                alert('\u5bfc\u51fa\u5931\u8d25')
            }
        }

        const importJson = async (event) => {
            const file = event && event.target && event.target.files && event.target.files[0]
            if (!file) return

            try {
                const text = await file.text()
                const parsed = JSON.parse(String(text || '').trim() || '{}')
                const cleanData = sanitizeData(parsed)
                config.value = cleanData
                localStorage.setItem(CACHE_KEY, JSON.stringify(cleanData))
                await saveConfig()
                alert('\u5bfc\u5165\u6210\u529f')
            } catch (e) {
                alert('\u5bfc\u5165\u5931\u8d25\u6216 JSON \u683c\u5f0f\u9519\u8bef')
            } finally {
                if (event && event.target) {
                    event.target.value = ''
                }
            }
        }

        const addUser = () => {
            const uid = String(newUserId.value || '').trim()
            if (!uid || config.value[uid]) return

            config.value[uid] = {
                'My Group': {
                    'Google': 'https://google.com'
                }
            }

            newUserId.value = ''
        }

        const deleteUser = (id) => {
            if (!confirm('Delete user id?')) return
            delete config.value[id]
        }

        const createUniqueName = (base, target) => {
            let i = 1
            let name = `${base} ${i}`
            while (target[name]) {
                i++
                name = `${base} ${i}`
            }
            return name
        }

        const addGroup = (id) => {
            const groups = config.value[id]
            if (Object.keys(groups).length >= 20) return
            const name = createUniqueName('Group', groups)
            groups[name] = { 'Link 1': 'https://' }
        }

        const addLink = (id, gn) => {
            const links = config.value[id][gn]
            if (Object.keys(links).length >= 20) return
            const name = createUniqueName('Link', links)
            links[name] = 'https://'
        }

        const deleteGroup = (id, gn) => {
            delete config.value[id][gn]
        }

        const deleteLink = (id, gn, ln) => {
            delete config.value[id][gn][ln]
        }

        const renameUser = (oldName, newName) => {
            newName = String(newName || '').trim()
            if (!newName || newName === oldName || config.value[newName]) return
            config.value = renameKeyInOrder(config.value, oldName, newName)
        }

        const renameGroup = (id, oldName, newName) => {
            newName = String(newName || '').trim()
            if (!newName || newName === oldName || config.value[id][newName]) return
            config.value[id] = renameKeyInOrder(config.value[id], oldName, newName)
        }

        const renameLink = (id, gn, oldName, newName) => {
            newName = String(newName || '').trim()
            if (!newName || newName === oldName || config.value[id][gn][newName]) return
            config.value[id][gn] = renameKeyInOrder(config.value[id][gn], oldName, newName)
        }

        const scrollToUser = (id) => {
            const el = document.getElementById('user-' + id)
            if (el) {
                window.scrollTo({ top: el.offsetTop - 20, behavior: 'smooth' })
            }
        }

        const scrollTo = (t) => {
            if (t === 'top') {
                window.scrollTo({ top: 0, behavior: 'smooth' })
            } else {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' })
            }
        }

        watch(
            config,
            () => {
                if (isBootstrapping || isSavingByCode) return
                queueSave()
            },
            { deep: true }
        )

        onMounted(fetchConfig)

        return {
            PUBLIC_DOMAIN,
            config,
            newUserId,
            isSaving,
            statusText,
            statusColor,
            copyStatus,
            copyItemStatus,
            saveConfig,
            beginEdit,
            endEdit,
            addUser,
            deleteUser,
            addLink,
            deleteLink,
            renameUser,
            renameGroup,
            renameLink,
            scrollTo,
            scrollToUser,
            addGroup,
            deleteGroup,
            toggleSingleProtocol,
            toggleGroupProtocol,
            getGroupStatusClass,
            getGroupStatusLabel,
            updateUrl,
            getJumpUrl,
            copyEndpoint,
            copyFullUrl,
            exportJson,
            importJson,
            getCopyItemKey,
            getLinkItemKey,
            getLinkDraft,
            onLinkNameInput,
            commitLinkName,
            stripProtocol
        }
    }
}).mount('#app')
</script>
</body>
</html>
