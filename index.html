<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | Azure Link Manager</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bg: '#0f172a', card: '#1e293b', border: '#334155',
                        primary: '#38bdf8', accent: '#22d3ee', success: '#4ade80',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; }
        .list-enter-active, .list-leave-active { transition: all 0.3s ease; }
        .list-enter-from, .list-leave-to { opacity: 0; transform: translateY(10px); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        input { background: rgba(15, 23, 42, 0.6); transition: all 0.2s; }
        input:focus { outline: none; border-color: #38bdf8; background: rgba(15, 23, 42, 0.9); }
    </style>
</head>

<body class="min-h-screen pb-20">
    <div id="app" class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="bg-card border border-border rounded-xl p-6 mb-8 shadow-lg flex flex-col md:flex-row justify-between items-center gap-4 transition-all duration-500"
            :class="{'shadow-green-500/20 border-green-500/50': statusText === 'Synced', 'shadow-red-500/20 border-red-500/50': statusText.includes('Error')}">
            <div class="flex items-center gap-4">
                <div class="relative">
                    <div class="w-3 h-3 rounded-full" :class="statusColor"></div>
                    <div v-if="statusText === 'Synced'" class="absolute top-0 left-0 w-3 h-3 rounded-full bg-green-400 animate-ping opacity-75"></div>
                </div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tight text-white flex items-center gap-2">
                        <span class="text-primary">NEXUS</span> AZURE
                    </h1>
                    <div class="text-slate-400 text-xs font-mono mt-1 flex gap-2">
                        <span>COSMOS_DB</span>
                        <span class="text-slate-600">|</span>
                        <span :class="{'text-green-400': statusText==='Synced', 'text-red-400': statusText.includes('Error')}">{{ statusText }}</span>
                    </div>
                </div>
            </div>
            <button @click="saveConfig" :disabled="isSaving" class="px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg transition-all active:scale-95 disabled:opacity-50 group">
                <span class="flex items-center gap-2">
                    <span v-if="isSaving" class="animate-spin text-xl">⟳</span>
                    <span v-else>SYNC TO CLOUD</span>
                </span>
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-card border border-border rounded-xl p-6 shadow-lg">
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">New Identity (ID)</h3>
                    <div class="flex gap-2 relative">
                        <span class="absolute left-3 top-2.5 text-slate-500 font-mono">ID:</span>
                        <input v-model="newUserId" @keyup.enter="addUser" type="text" placeholder="e.g. nas" class="w-full border border-slate-600 rounded-lg pl-10 pr-4 py-2 text-sm text-white font-mono">
                        <button @click="addUser" class="bg-slate-700 hover:bg-slate-600 text-white px-4 rounded-lg border border-slate-600 font-bold">+</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <transition-group name="list">
                    <div v-for="(userGroups, userId) in config" :key="userId" class="bg-card border border-border rounded-xl p-6 shadow-lg relative group transition-all mb-6">
                        <div class="flex justify-between items-center mb-6 pb-4 border-b border-white/5">
                            <div class="flex items-center gap-4 w-full">
                                <div class="w-12 h-12 flex-shrink-0 rounded-lg bg-slate-800 border border-slate-700 flex items-center justify-center font-bold text-primary shadow-inner">
                                    {{ userId.substring(0,2).toUpperCase() }}
                                </div>
                                <div class="flex-grow">
                                    <input type="text" :value="userId" @change="renameUser(userId, $event.target.value)" class="bg-transparent text-2xl font-bold text-white tracking-tight w-full focus:outline-none focus:border-b focus:border-primary transition-all p-0">
                                    <div class="text-xs font-mono text-slate-400 mt-1">Endpoint: ?id={{ userId }}</div>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity absolute right-6 top-6">
                                <button @click="copyLink(userId)" class="p-2 bg-slate-800 rounded border border-slate-700" :class="copyStatus[userId] ? 'text-green-400' : 'text-slate-400 hover:text-primary'">
                                    <span v-if="!copyStatus[userId]" class="flex items-center gap-1 text-xs font-bold">📋 COPY</span>
                                    <span v-else class="flex items-center gap-1 text-xs font-bold">✨ COPIED</span>
                                </button>
                                <button @click="deleteUser(userId)" class="text-slate-600 hover:text-red-400 p-2 bg-slate-800 rounded border border-slate-700">🗑️</button>
                            </div>
                        </div>

                        <div class="space-y-4">
                            <div v-for="(links, groupName) in userGroups" :key="groupName" class="bg-slate-900/50 rounded-lg p-4 border border-slate-800/50">
                                <div class="flex justify-between items-center mb-3">
                                    <input type="text" :value="groupName" @change="renameGroup(userId, groupName, $event.target.value)" class="bg-transparent text-sm font-bold text-slate-300 uppercase cursor-pointer hover:text-white focus:outline-none focus:text-primary transition-colors">
                                    <div class="flex items-center gap-2">
                                        <button @click="addLink(userId, groupName)" class="text-[10px] bg-slate-800 hover:bg-primary text-white px-2 py-1 rounded transition border border-slate-700">+ LINK</button>
                                        <button @click="deleteGroup(userId, groupName)" class="text-xs text-slate-600 hover:text-red-400 px-2">×</button>
                                    </div>
                                </div>
                                <div class="space-y-2 pl-3">
                                    <div v-for="(url, name) in links" :key="name" class="flex items-center gap-3 group/link">
                                        <input type="text" :value="name" @change="renameLink(userId, groupName, name, $event.target.value)" class="w-1/3 bg-slate-900 border border-slate-800 rounded px-3 py-1 text-xs text-slate-300 focus:text-white focus:border-primary">
                                        <span class="text-slate-600 text-xs">➜</span>
                                        <input type="text" v-model="config[userId][groupName][name]" class="flex-1 bg-slate-900 border border-slate-800 rounded px-3 py-1 text-xs font-mono text-primary focus:border-primary">
                                        <button @click="deleteLink(userId, groupName, name)" class="text-slate-600 hover:text-red-400 opacity-0 group-hover/link:opacity-100 px-2 transition-opacity">×</button>
                                    </div>
                                </div>
                            </div>
                            <button @click="addGroup(userId)" class="w-full py-2 border border-dashed border-slate-700 text-slate-500 hover:text-primary hover:border-primary rounded-lg text-xs font-bold uppercase tracking-widest transition-all">+ New Group</button>
                        </div>
                    </div>
                </transition-group>
            </div>
        </div>
    </div>

    <script>
        // ✅ 1. 定义后端地址 (Azure Function)
        const BASE_URL = 'https://forever302free-h0d9bvemhaaffzhk.southeastasia-01.azurewebsites.net/api/nexus-handler';
        // ✅ 2. 定义密钥 (你自用，硬编码没问题)
        const ACCESS_CODE = 'KD0qUaWPZgOBfzFbQtiZTfeluyK98b9w2iqpE1LLiiWNAzFuWJ2vfw==';
        
        // 拼接完整的管理 API 地址
        const API_URL = `${BASE_URL}?code=${ACCESS_CODE}`;

        const { createApp, ref, onMounted, watch } = Vue;
        createApp({
            setup() {
                const config = ref({});
                const newUserId = ref('');
                const isSaving = ref(false);
                const statusText = ref('Connecting...');
                const statusColor = ref('bg-yellow-500');
                const copyStatus = ref({});
                let timer = null;

                // --- 核心网络请求 ---

                const fetchConfig = async () => {
                    try {
                        statusText.value = 'Syncing...';
                        const res = await fetch(`${API_URL}&action=get`);
                        if (!res.ok) throw new Error('Network Error');
                        const data = await res.json();
                        config.value = data || {};
                        statusText.value = 'Synced';
                        statusColor.value = 'bg-green-400';
                    } catch (e) {
                        console.error(e);
                        statusText.value = 'Connect Error';
                        statusColor.value = 'bg-red-500';
                    }
                };

                const saveConfig = async () => {
                    if (Object.keys(config.value).length === 0) return;
                    isSaving.value = true;
                    try {
                        const res = await fetch(`${API_URL}&action=save`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(config.value)
                        });
                        if(res.ok) {
                            statusText.value = 'Synced';
                            statusColor.value = 'bg-green-400';
                        } else { throw new Error(); }
                    } catch (e) {
                        statusText.value = 'Save Error';
                        statusColor.value = 'bg-red-500';
                    } finally {
                        isSaving.value = false;
                    }
                };

                // --- 业务逻辑 (完美复刻稳定版) ---

                const addUser = () => {
                    const id = newUserId.value.trim();
                    if (id && !config.value[id]) {
                        config.value[id] = { 'Default': { 'My Link': 'http://' } };
                        newUserId.value = '';
                    }
                };

                // 复制链接：包含 Code 保证跳转成功
                const copyLink = (uid) => {
                    const url = `${BASE_URL}?code=${ACCESS_CODE}&id=${uid}`;
                    navigator.clipboard.writeText(url);
                    copyStatus.value[uid] = true;
                    setTimeout(() => copyStatus.value[uid] = false, 2000);
                };

                // 自动保存监听
                watch(config, () => {
                    if (statusText.value !== 'Syncing...') {
                        statusText.value = 'Modified...';
                        statusColor.value = 'bg-yellow-500';
                    }
                    if (timer) clearTimeout(timer);
                    timer = setTimeout(saveConfig, 2000);
                }, { deep: true });

                // 删除逻辑
                const deleteUser = (id) => { if(confirm(`Confirm delete ID: ${id}?`)) delete config.value[id]; };
                const deleteGroup = (id, gn) => delete config.value[id][gn];
                const deleteLink = (id, gn, ln) => delete config.value[id][gn][ln];

                // 添加逻辑
                const addGroup = (id) => {
                    const newName = 'Group ' + (Object.keys(config.value[id]).length + 1);
                    config.value[id][newName] = { 'New Link': 'http://' };
                };
                const addLink = (id, gn) => config.value[id][gn]['New Link'] = 'http://';

                // --- 核心重命名逻辑 (修复了旧版可能丢失数据的隐患) ---

                // 重命名用户 ID (Key)
                const renameUser = (oldName, newName) => {
                    const n = newName.trim();
                    if (n && n !== oldName && !config.value[n]) {
                        // 保持原数据顺序创建新对象
                        const newConfig = {};
                        for (const key in config.value) {
                            if (key === oldName) {
                                newConfig[n] = config.value[oldName];
                            } else {
                                newConfig[key] = config.value[key];
                            }
                        }
                        config.value = newConfig; // 替换整个对象以触发更新
                    }
                };

                // 重命名分组 (Key)
                const renameGroup = (id, oldName, newName) => {
                    const n = newName.trim();
                    if (n && n !== oldName && !config.value[id][n]) {
                        const data = config.value[id][oldName];
                        config.value[id][n] = data;
                        delete config.value[id][oldName];
                    }
                };

                // 重命名链接 (Key)
                const renameLink = (id, gn, oldName, newName) => {
                    const n = newName.trim();
                    if (n && n !== oldName && !config.value[id][gn][n]) {
                        const url = config.value[id][gn][oldName];
                        config.value[id][gn][n] = url;
                        delete config.value[id][gn][oldName];
                    }
                };

                onMounted(fetchConfig);

                return { 
                    config, newUserId, isSaving, statusText, statusColor, copyStatus, 
                    saveConfig, addUser, deleteUser, addGroup, deleteGroup, addLink, deleteLink, 
                    renameUser, renameGroup, renameLink, copyLink 
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
