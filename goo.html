<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Nexus 极速跳转</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .spin {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">
    <!-- loading -->
    <div id="loader" class="text-center">
        <div class="inline-block w-8 h-8 border-4 border-sky-500 border-t-transparent rounded-full spin mb-4"></div>
        <p class="text-slate-400">正在获取最新配置...</p>
    </div>

    <!-- app -->
    <div id="app" class="max-w-md w-full hidden">
        <h2 class="text-3xl font-bold text-white text-center mb-8">
            Hello, <span id="userName" class="text-sky-400">User</span>
        </h2>
        <div id="groupsContainer"></div>
    </div>

<script>
(async function () {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    const loader = document.getElementById('loader');
    const app = document.getElementById('app');

    let owner = "";
    let repo = "";
    const configApiPath = "/api/config";
    const configFilePath = 'config.secure.json';
    const configCipherKey = 'NEXUS_LITE_2026';

    const utf8Encode = (str) => new TextEncoder().encode(str);
    const utf8Decode = (buf) => new TextDecoder().decode(buf);
    const xorBytes = (inputBytes, keyText) => {
        const keyBytes = utf8Encode(keyText);
        const out = new Uint8Array(inputBytes.length);
        for (let i = 0; i < inputBytes.length; i++) out[i] = inputBytes[i] ^ keyBytes[i % keyBytes.length];
        return out;
    };
    const base64ToBytes = (base64) => Uint8Array.from(atob(base64), c => c.charCodeAt(0));
    const decryptConfigPayload = (payload) => {
        if (!payload || typeof payload !== 'object') return payload || {};
        if (payload.alg !== 'xor-base64' || !payload.data) return payload;
        const decrypted = xorBytes(base64ToBytes(payload.data), configCipherKey);
        return JSON.parse(utf8Decode(decrypted));
    };

    if (!id) {
        window.location.replace("./index.html");
        return;
    }

    const token = localStorage.getItem('NEXUS_GH_TOKEN_V2');

    async function loadRuntimeConfig() {
        const res = await fetch(`${configApiPath}?t=${Date.now()}`, { cache: 'no-store' });
        if (!res.ok) throw new Error('运行时配置加载失败');
        const runtimeConfig = await res.json();
        owner = runtimeConfig.owner || '';
        repo = runtimeConfig.repo || '';
        return runtimeConfig;
    }

    async function fetchConfigFromGitHub() {
        const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${configFilePath}?v=${Date.now()}`;
        const headers = token ? { Authorization: `token ${token}` } : {};
        const res = await fetch(apiUrl, { headers });
        if (!res.ok) throw new Error("API 请求失败");
        const data = await res.json();
        return decryptConfigPayload(JSON.parse(decodeURIComponent(escape(atob(data.content)))));
    }

    try {
        const runtimeConfig = await loadRuntimeConfig();
        const config = token ? await fetchConfigFromGitHub() : decryptConfigPayload(runtimeConfig.config || {});
        const userData = config[id];

        if (!userData) {
            loader.innerHTML = `<p class="text-rose-500 font-bold">未找到 ID: ${id}</p>`;
            return;
        }

        let allLinks = [];
        for (const group of Object.values(userData)) {
            for (const url of Object.values(group)) {
                if (url && url.startsWith('http')) allLinks.push(url);
            }
        }

        if (allLinks.length === 1) {
            window.location.replace(allLinks[0]);
            return;
        }

        renderUI(id, userData);

    } catch (err) {
        loader.innerHTML = `<p class="text-rose-400">系统错误: ${err.message}</p>`;
    }

    function renderUI(userId, groups) {
        document.getElementById('userName').innerText = userId;
        const container = document.getElementById('groupsContainer');

        let html = '';

        for (const [groupName, links] of Object.entries(groups)) {
            const validLinks = Object.entries(links)
                .filter(([_, url]) => url && url.startsWith('http'));

            if (validLinks.length === 0) continue;

            const linksHtml = validLinks.map(([name, url]) => {
                const displayUrl = url.replace(/^https?:\/\//, '');
                return `
                    <a href="${url}"
                       class="flex items-center justify-between gap-4 px-5 py-4
                              border border-slate-700 rounded-xl
                              bg-slate-800 hover:border-sky-500
                              transition-all mb-3 group">

                        <!-- 左侧：名称 + URL（同一行，超出 ...） -->
                        <div class="flex items-center gap-3 min-w-0">
                            <span class="font-medium text-slate-200 shrink-0">
                                ${name}
                            </span>
                            <span class="text-sm text-slate-500 truncate group-hover:text-sky-400">
                                ${displayUrl}
                            </span>
                        </div>

                        <!-- 右侧箭头 -->
                        <span class="text-slate-600 shrink-0 group-hover:text-sky-400">
                            →
                        </span>
                    </a>
                `;
            }).join('');

            html += `
                <div class="mb-6">
                    <h3 class="text-xs font-bold text-slate-500 uppercase mb-3 tracking-widest">
                        ${groupName}
                    </h3>
                    <div class="flex flex-col">
                        ${linksHtml}
                    </div>
                </div>
            `;
        }

        container.innerHTML = html;
        loader.classList.add('hidden');
        app.classList.remove('hidden');
    }
})();
</script>

</body>
</html>
