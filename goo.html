<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Nexus 极速跳转</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div id="loader" class="text-center">
        <div class="inline-block w-8 h-8 border-4 border-sky-500 border-t-transparent rounded-full spin mb-4"></div>
        <p class="text-slate-400">正在建立安全连接...</p>
    </div>

    <div id="app" class="max-w-md w-full hidden">
        <h2 class="text-3xl font-bold text-white text-center mb-8">Hello, <span id="userName" class="text-sky-400">User</span></h2>
        <div id="groupsContainer"></div>
    </div>

    <script>
        (async function() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const loader = document.getElementById('loader');
            const app = document.getElementById('app');

            if (!id) {
                window.location.replace("./index.html");
                return;
            }

            try {
                // 1. 获取静态配置文件
                const res = await fetch('./config.json');
                if (!res.ok) throw new Error("无法加载配置");
                const config = await res.json();

                // 2. 查找匹配的配置
                const userConfig = config[id];
                if (!userConfig) {
                    loader.innerHTML = `<p class="text-rose-500">未找到配置 ID: ${id}</p>`;
                    return;
                }

                // 3. 提取所有合法链接 (对应后端视图逻辑)
                let allLinks = [];
                for (let groupName in userConfig) {
                    for (let linkName in userConfig[groupName]) {
                        const url = userConfig[groupName][linkName];
                        if (url && (url.startsWith('http'))) {
                            allLinks.push({ group: groupName, name: linkName, url: url });
                        }
                    }
                }

                // 4. 逻辑分流
                if (allLinks.length === 1) {
                    // 场景 A: 只有一个链接 -> 秒跳 (对应后端 302)
                    window.location.replace(allLinks[0].url);
                } else if (allLinks.length > 1) {
                    // 场景 B: 多个链接 -> 渲染 UI (对应后端 HTML 渲染)
                    renderUI(id, userConfig);
                } else {
                    loader.innerHTML = `<p class="text-slate-500">该 ID 下暂无有效链接</p>`;
                }

            } catch (err) {
                loader.innerHTML = `<p class="text-rose-500">加载失败: ${err.message}</p>`;
            }

            function renderUI(userId, groups) {
                document.getElementById('userName').innerText = userId;
                const container = document.getElementById('groupsContainer');
                let html = '';

                for (const [groupName, links] of Object.entries(groups)) {
                    const validLinks = Object.entries(links).filter(([_, url]) => url && url.startsWith('http'));
                    if (validLinks.length === 0) continue;

                    let linksHtml = validLinks.map(([name, url]) => `
                        <a href="${url}" class="flex justify-between px-5 py-4 border border-slate-700 rounded-xl bg-slate-800 hover:border-sky-500 text-slate-200 transition-all mb-3 group">
                            <span>${name}</span>
                            <span class="text-slate-500 group-hover:text-sky-400">→</span>
                        </a>
                    `).join('');

                    html += `
                        <div class="mb-6">
                            <h3 class="text-xs font-bold text-slate-500 uppercase mb-3 tracking-widest">${groupName}</h3>
                            <div class="flex flex-col">${linksHtml}</div>
                        </div>`;
                }

                container.innerHTML = html;
                loader.classList.add('hidden');
                app.classList.remove('hidden');
            }
        })();
    </script>
</body>
</html>
